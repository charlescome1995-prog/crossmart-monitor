name: Monitor Capture

on:
  repository_dispatch:
    types: [trigger-capture]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python deps
        run: |
          pip install requests beautifulsoup4 lxml selenium webdriver-manager

      - name: Read user config
        run: |
          python - <<'PYEOF'
          import json, os
          # Read from backend/data/user_config.json
          with open('backend/data/user_config.json', 'r', encoding='utf-8') as f:
              cfg = json.load(f)
          print('asins:', json.dumps([r['main'] for r in cfg.get('asins', []) if r.get('main')]))
          print('keywords:', json.dumps([r['main'] for r in cfg.get('keywords', []) if r.get('main')]))
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              asins = json.dumps([r['main'] for r in cfg.get('asins', []) if r.get('main')])
              kws = json.dumps([r['main'] for r in cfg.get('keywords', []) if r.get('main')])
              f.write(f'ASINS={asins}\n')
              f.write(f'KEYWORDS={kws}\n')
          PYEOF

      - name: Run keyword monitor
        env:
          CDP_PORT: 9222
        run: |
          python - <<'PYEOF'
          import json, os, subprocess
          keywords = json.loads(os.environ.get('KEYWORDS', '[]'))
          print(f'Running {len(keywords)} keywords...')
          for kw in keywords:
              print(f'Running keyword: {kw}')
              result = subprocess.run(['python', '-m', 'browser.keyword_monitor', kw],
                  capture_output=True, text=True, cwd='backend')
              print(result.stdout[-1000:] if result.stdout else '')
              if result.returncode != 0:
                  print('ERROR:', result.stderr[-500:])
          print('Keyword monitoring done')
          PYEOF

      - name: Run ASIN monitor
        env:
          CDP_PORT: 9222
        run: |
          python - <<'PYEOF'
          import json, os, subprocess
          asins = json.loads(os.environ.get('ASINS', '[]'))
          print(f'Running {len(asins)} ASINs...')
          for asin in asins:
              print(f'Running ASIN: {asin}')
              result = subprocess.run(['python', '-m', 'browser.asin_monitor', asin],
                  capture_output=True, text=True, cwd='backend')
              print(result.stdout[-1000:] if result.stdout else '')
              if result.returncode != 0:
                  print('ERROR:', result.stderr[-500:])
          print('ASIN monitoring done')
          PYEOF

      - name: Sync and push data
        run: |
          python backend/sync_monitor_data.py
          git config --global user.name 'CrossMart Bot'
          git config --global user.email 'bot@crossmart.ai'
          git add frontend/data/rawData.json
          git diff --staged --quiet || (git commit -m "auto: sync rawData $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
