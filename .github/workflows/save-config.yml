name: Monitor Capture

on:
  push:
    paths:
      - 'backend/data/user_config.json'
      - 'backend/data/trigger.json'
      - 'frontend/monitor.html'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  capture:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install browser deps
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg
          wget -q -O - https://dl-ssl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" | sudo tee /etc/apt/sources.list.d/google-chrome.list
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable

      - name: Install Python deps
        run: |
          pip install requests beautifulsoup4 lxml selenium webdriver-manager

      - name: Read user config
        run: |
          python - <<'PYEOF'
          import json, os
          with open('backend/data/user_config.json', 'r', encoding='utf-8') as f:
              cfg = json.load(f)
          with open(os.environ['GITHUB_ENV'], 'a') as f:
              asins = json.dumps([r['main'] for r in cfg.get('asins', []) if r.get('main')])
              kws = json.dumps([r['main'] for r in cfg.get('keywords', []) if r.get('main')])
              f.write(f'ASINS={asins}\n')
              f.write(f'KEYWORDS={kws}\n')
          PYEOF

      - name: Run keyword monitor
        env:
          CDP_PORT: 9222
        run: |
          python - <<'PYEOF'
          import json, os, subprocess
          keywords = json.loads(os.environ.get('KEYWORDS', '[]'))
          for kw in keywords:
              result = subprocess.run(['python', '-m', 'browser.keyword_monitor', kw],
                  capture_output=True, text=True, cwd='backend')
              if result.returncode != 0:
                  print('KW ERROR:', result.stderr[-500:])
          PYEOF

      - name: Run ASIN monitor
        env:
          CDP_PORT: 9222
        run: |
          python - <<'PYEOF'
          import json, os, subprocess
          asins = json.loads(os.environ.get('ASINS', '[]'))
          for asin in asins:
              result = subprocess.run(['python', '-m', 'browser.asin_monitor', asin],
                  capture_output=True, text=True, cwd='backend')
              if result.returncode != 0:
                  print('ASIN ERROR:', result.stderr[-500:])
          PYEOF

      - name: Sync and push data
        run: |
          python backend/sync_monitor_data.py
          git config --global user.name 'CrossMart Bot'
          git config --global user.email 'bot@crossmart.ai'
          git add frontend/data/rawData.json backend/data/asin_related_asins.json
          git diff --staged --quiet || (git commit -m "auto: sync $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)

      - name: Update trigger status to done
        run: |
          python - <<'PYEOF'
          import json
          trigger_path = 'backend/data/trigger.json'
          with open(trigger_path, 'r', encoding='utf-8') as f:
              t = json.load(f)
          t['status'] = 'done'
          t['completed_at'] = datetime.now().isoformat()
          with open(trigger_path, 'w', encoding='utf-8') as f:
              json.dump(t, f, ensure_ascii=False, indent=2)
          PYEOF
          git config --global user.name 'CrossMart Bot'
          git config --global user.email 'bot@crossmart.ai'
          git add backend/data/trigger.json
          git commit -m "auto: trigger done" && git push