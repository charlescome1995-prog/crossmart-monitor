name: Save Config
on:
  repository_dispatch:
    types: [save-config]

jobs:
  save:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write user config
        run: |
          echo '${{ github.event.client_payload.data }}' > backend/data/user_config.json

      - name: Commit and push
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@crossmart.local"
          git add backend/data/user_config.json
          git diff --staged --quiet || git commit -m "update config from monitor page"
          git push