name: Sync Monitor Data

on:
  schedule:
    # 每天 UTC 6:30 = 北京时间 14:30
    - cron: '30 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 lxml
      
      - name: Pull latest data via API
        run: |
          # 通过API获取最新的监控数据并生成monitor-data.json
          python sync_to_frontend.py
        working-directory: backend/
      
      - name: Commit and push if changed
        run: |
          git config --global user.name 'CrossMart Bot'
          git config --global user.email 'bot@crossmart.ai'
          git add frontend/data/monitor-data.json
          git diff --staged --quiet || (git commit -m "auto: sync monitor data $(date -u '+%Y-%m-%d %H:%M UTC')" && git push)
