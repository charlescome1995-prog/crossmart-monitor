<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>

<style>/* ─── Global ─── */
*{box-sizing:border-box;font-family:'Times New Roman',Georgia,serif}
body{margin:0;background:#f0f2f2;color:#131921;font-size:13px}
img{max-width:100%}

/* ─── Top Bar ─── */
.topbar{background:#131921;color:#fff;display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 24px;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:16px}
.topbar nav{display:flex;gap:14px;font-size:13px}
.topbar nav a{color:rgba(255,255,255,.75);text-decoration:none;padding:4px 0;border-bottom:2px solid transparent;transition:.15s}
.topbar nav a:hover,.topbar nav a.active{color:#fff;border-bottom-color:#e94560}

/* ─── Targets Bar ─── */
.tbar{background:#fff;border-bottom:2px solid #d5d9d9;padding:10px 16px;display:flex;gap:0;align-items:flex-start;box-shadow:0 2px 6px rgba(0,0,0,.06)}
.tblock{display:flex;flex-direction:column;gap:4px;padding:0 14px;flex:1}
.tblock.asin-block{background:#f0f7ff;border-radius:8px 0 0 8px;padding-right:14px}
.tsep{width:2px;background:#d5d9d9;align-self:stretch;border-radius:0}
.tblock.kw-block{background:#f0fff4;border-radius:0 8px 8px 0;padding-left:14px}
.tlabel{font-size:10px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px}
.trow{display:flex;gap:4px}
.tchip{background:#131921;color:#fff;border-radius:16px;padding:3px 10px;font-size:11px;font-weight:600;width:80px;outline:none;border:none;transition:.15s}
.tchip::placeholder{color:rgba(255,255,255,.4)}
.tchip:hover{background:#e94560}
.tchip.kw-chip{background:#065f46;width:100px}
.tchip.kw-chip:hover{background:#059669}
.tbar-btns{display:flex;flex-direction:column;gap:4px;padding:0 10px;justify-content:center}
.btn{display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s;background:#e6e8ea;color:#0f1111}
.btn:hover{background:#d5d9d9}
.btn-save{background:#ffd814;color:#0f1111}.btn-save:hover{background:#f7ca00}
.btn-sm{padding:3px 10px;font-size:10px}
.saved-msg{font-size:10px;color:#059669;font-weight:600;margin-top:2px}

/* ─── Filter Bar ─── */
.filters{background:#fff;padding:8px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #d5d9d9;position:sticky;top:87px;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap}
.filters input{padding:5px 10px;border:1px solid #d5d9d9;border-radius:6px;font-size:12px;width:140px}
.filters select{padding:5px 10px;border:1px solid #d5d9d9;border-radius:6px;font-size:12px}
.filters label{font-size:12px;color:#555;display:flex;align-items:center;gap:4px;cursor:pointer}

/* ─── Board Grid (5 columns) ─── */
.board-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;padding:10px}
.grid-col{display:flex;flex-direction:column;gap:4px}
.col-hdr{background:#131921;color:#fff;padding:6px 10px;border-radius:8px 8px 0 0;display:flex;align-items:center;justify-content:space-between}
.col-hdr-asin{font-size:11px;font-weight:700;color:#fff}
.col-hdr-n{font-size:10px;background:rgba(255,255,255,.15);padding:1px 7px;border-radius:10px}
.empty-col{flex:1;background:#fff;border-radius:0 0 8px 8px;display:flex;align-items:center;justify-content:center;color:#ccc;font-size:11px;min-height:80px;box-shadow:0 1px 4px rgba(0,0,0,.06)}

/* ─── Member Card ─── */
.mcard{background:#fff;border-radius:0 0 8px 8px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);transition:.1s}
.mcard:hover{background:#f9fbff}
.mcard.changed{background:#fffbe6}
.mc-img{width:100%;height:90px;display:flex;align-items:center;justify-content:center;background:#fafafa;overflow:hidden}
.mc-img img{width:100%;height:90px;object-fit:cover}
.mc-img .ph{font-size:32px;color:#ddd}
.mc-body{padding:8px 10px;display:flex;flex-direction:column;gap:3px}
.mc-title-row{display:flex;align-items:flex-start;gap:6px}
.mc-title{font-size:11px;font-weight:600;color:#0f1111;line-height:1.3;flex:1;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.mc-asin{font-size:10px;font-weight:700;color:#007185;background:#effaff;padding:1px 6px;border-radius:3px;display:inline-block;align-self:flex-start}
.mc-metrics{display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}
.mc-metric{display:flex;flex-direction:column;gap:1px}
.mc-metric .mcm-l{font-size:8px;color:#888;font-weight:500;text-transform:uppercase}
.mc-metric .mcm-v{font-size:11px;font-weight:700;color:#131921}
.mc-metric .mcm-v.pc{color:#B12704}
.mc-metric .mcm-v.rt{color:#d99536}
.mc-bsr{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.mc-bsr-item{display:flex;align-items:center;gap:2px;font-size:10px}
.mc-bsr-item .mcb-l{font-weight:500;color:#555}
.mc-bsr-item .mcb-v{font-weight:700;color:#067d62}
.sort-key{cursor:pointer}.sort-key:hover{text-decoration:underline}
.mc-status{display:flex;align-items:center;gap:6px}
.as-stable{color:#059669;font-weight:600;font-size:10px}
.as-warn{color:#d97706;font-weight:600;font-size:10px}
.mc-chgs{border-top:1px dashed #e0c060;margin-top:4px;padding-top:4px}
.mc-chg-item{font-size:10px;color:#555;padding:1px 0;display:flex;gap:4px;align-items:flex-start;flex-wrap:wrap}
.ci-label{min-width:28px;color:#888;font-weight:500}
.ci-old{text-decoration:line-through;color:#aaa}
.ci-arrow{color:#d97706;flex-shrink:0}
.ci-new{color:#059669;font-weight:600}
.ci-pct{font-size:9px;color:#888;margin-left:2px}
.mc-chart{height:50px;margin-top:4px}
.mc-chart canvas{max-height:50px!important}

.loading{text-align:center;padding:40px;color:#999;font-size:13px}

@media(max-width:900px){
  .board-grid{grid-template-columns:repeat(3,1fr)}
  .tbar{flex-wrap:wrap}
  .tchip{width:70px}
  .tchip.kw-chip{width:90px}
}
@media(max-width:600px){
  .board-grid{grid-template-columns:repeat(2,1fr)}
}</style>
</head>
<body>
<div class="topbar">
  <span class="brand">Cross<span style="color:#e94560">Mart</span></span>
  <nav>
    <a href="../index.html">Home</a>
    <a href="monitor.html" class="active">Monitor</a>
    <a href="selection.html">Selection</a>
  </nav>
</div>

<div class="tbar">
  <div class="tblock asin-block">
    <div class="tlabel">ASIN Groups</div>
    <div id="targetsInner"></div>
  </div>
  <div class="tsep"></div>
  <div class="tblock kw-block">
    <div class="tlabel">Keywords</div>
    <div class="trow" id="kwRow"></div>
  </div>
  <div class="tbar-btns">
    <button class="btn btn-save btn-sm" onclick="saveTargets()">Save</button>
    <span class="saved-msg" id="savedMsg" style="display:none">Saved</span>
    <button class="btn btn-sm" onclick="refresh()">Refresh</button>
  </div>
</div>

<div class="filters">
  <input type="text" id="sf" placeholder="Search ASIN or title..." oninput="render()">
  <select id="ss" onchange="render()">
    <option value="bsr">BSR</option>
    <option value="price">Price</option>
    <option value="price_chg">Price Change</option>
    <option value="bsr_chg">BSR Change</option>
    <option value="rating">Rating</option>
    <option value="reviews">Reviews</option>
  </select>
  <label><input type="checkbox" id="sc" onchange="render()"> Changes only</label>
  <button class="btn btn-sm" onclick="refresh()">Refresh</button>
  <button class="btn btn-sm btn-save" onclick="exportXlsx()">Export Excel</button>
</div>

<div id="board" class="board"><div class="loading">Loading...</div></div>

<script>
/* global MONITOR_EMBED, Chart, XLSX */
var _data = null;
var _charts = {};
/* _targets: { asins: [[5],[5],[5],[5],[5]], keywords: [5] } */
var _targets = {
  asins: [
    ['','','','',''],
    ['','','','',''],
    ['','','','',''],
    ['','','','',''],
    ['','','','','']
  ],
  keywords: ['','','','','']
};
var _sortCol = 'bsr';
var _sortDir = 1;

function initMonitor(data) {
  _data = data;
  loadTargets();
  renderTargetsBar();
  render();
}

function refresh() {
  initMonitor(window.MONITOR_EMBED || {});
}

/* ── Targets bar ── */
function loadTargets() {
  try {
    var t = localStorage.getItem('cm_targets');
    if (t) _targets = JSON.parse(t);
    /* migrate old flat format */
    if (_targets.asins && !Array.isArray(_targets.asins[0])) {
      _targets.asins = _targets.asins.map ? [_targets.asins] : _targets.asins;
    }
  } catch(e) {}
}

function saveTargets() {
  try {
    localStorage.setItem('cm_targets', JSON.stringify(_targets));
    var msg = document.getElementById('savedMsg');
    if (msg) { msg.style.display = 'inline'; setTimeout(function(){ msg.style.display = 'none'; }, 2000); }
  } catch(e) {}
}

function _tv(s) {
  return s == null ? '' : String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');
}

function onTargetAsin(gi, idx, val) {
  _targets.asins[gi][idx] = val.trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
  saveTargets();
  renderTargetsBar();
  render();
}
function onTargetKw(idx, val) {
  _targets.keywords[idx] = val.trim();
  saveTargets();
  renderTargetsBar();
  render();
}

function getTargetAsins() {
  var flat = [];
  _targets.asins.forEach(function(row) { flat = flat.concat(row.filter(function(s){ return s.length > 0; })); });
  return flat;
}
function getTargetKws() {
  return _targets.keywords.filter(function(s){ return s.length > 0; });
}

function renderTargetsBar() {
  var el = document.getElementById('targetsInner');
  if (!el) return;

  /* Build ASIN grid: 5 columns, 5 rows */
  var asinHtml = '';
  for (var row = 0; row < 5; row++) {
    asinHtml += '<div class="trow">';
    for (var col = 0; col < 5; col++) {
      asinHtml += '<input type="text" class="tchip asin-chip" '
        + 'id="ta' + col + '_' + row + '" '
        + 'value="' + _tv(_targets.asins[col][row]) + '" '
        + 'placeholder="' + (row === 0 ? 'Main' : '') + '" '
        + 'maxlength="10" '
        + 'onchange="onTargetAsin(' + col + ',' + row + ',this.value)">';
    }
    asinHtml += '</div>';
  }

  /* Build Keywords row */
  var kwHtml = '';
  for (var k = 0; k < 5; k++) {
    kwHtml += '<input type="text" class="tchip kw-chip" '
      + 'id="tk' + k + '" '
      + 'value="' + _tv(_targets.keywords[k]) + '" '
      + 'placeholder="Keyword ' + (k+1) + '" '
      + 'onchange="onTargetKw(' + k + ',this.value)">';
  }

  el.innerHTML =
    '<div class="tblock asin-block">' +
      '<div class="tlabel">ASIN Groups</div>' +
      asinHtml +
    '</div>' +
    '<div class="tsep"></div>' +
    '<div class="tblock kw-block">' +
      '<div class="tlabel">Keywords</div>' +
      '<div class="trow">' + kwHtml + '</div>' +
    '</div>';
}

function getAllMembers() {
  if (!_data || !_data.groups) return [];
  return _data.groups.reduce(function(acc, g) {
    g.members.forEach(function(m) { if (m.asin) acc.push(m); });
    return acc;
  }, []);
}

/* ── Utility ── */
function e(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtPrice(v) { return v != null ? '$' + v.toFixed(2) : '---'; }
function fmtBSR(v)   { return v != null ? '#' + v.toLocaleString() : '---'; }

function getChange(member) {
  var h = member.history || [];
  if (h.length < 2) return null;
  var p1 = null, p2 = null;
  for (var i = h.length - 1; i >= 0; i--) {
    if (h[i].price != null && p1 === null) p1 = h[i].price;
    else if (h[i].price != null && p2 === null) { p2 = h[i].price; break; }
  }
  if (p1 == null || p2 == null) return null;
  return { price_from: p2, price_to: p1, price_pct: Math.round((p1 - p2) / p2 * 1000) / 10 };
}

function getBSRChange(member) {
  var h = member.history || [];
  if (h.length < 2) return null;
  var b1 = null, b2 = null;
  for (var i = h.length - 1; i >= 0; i--) {
    if (h[i].bsr != null && b1 === null) b1 = h[i].bsr;
    else if (h[i].bsr != null && b2 === null) { b2 = h[i].bsr; break; }
  }
  if (b1 == null || b2 == null) return null;
  return { bsr_from: b2, bsr_to: b1, bsr_diff: b1 - b2 };
}

function getRatingChange(member) {
  var h = member.history || [];
  if (h.length < 2) return null;
  var r1 = null, r2 = null;
  for (var i = h.length - 1; i >= 0; i--) {
    if (h[i].rating != null && r1 === null) r1 = h[i].rating;
    else if (h[i].rating != null && r2 === null) { r2 = h[i].rating; break; }
  }
  if (r1 == null || r2 == null) return null;
  return { rating_from: r2, rating_to: r1 };
}

function getLastTs(member) {
  var h = member.history || [];
  for (var i = h.length - 1; i >= 0; i--) {
    if (h[i].price != null || h[i].bsr != null) return h[i].timestamp || '';
  }
  return '';
}

function getChangeSet(member) {
  var changes = [];
  var pc = getChange(member);
  if (pc && pc.price_pct !== 0) {
    changes.push({ type: 'price', label: 'Price',
      old: fmtPrice(pc.price_from), new: fmtPrice(pc.price_to),
      pct: pc.price_pct > 0 ? '+' + pc.price_pct + '%' : pc.price_pct + '%' });
  }
  var bc = getBSRChange(member);
  if (bc && bc.bsr_diff !== 0) {
    changes.push({ type: 'bsr', label: 'BSR',
      old: '#' + bc.bsr_from.toLocaleString(), new: '#' + bc.bsr_to.toLocaleString(),
      pct: bc.bsr_diff < 0 ? String.fromCharCode(8595) + Math.abs(bc.bsr_diff) : String.fromCharCode(8593) + bc.bsr_diff });
  }
  var rc = getRatingChange(member);
  if (rc && rc.rating_to !== rc.rating_from) {
    changes.push({ type: 'rating', label: 'Rating',
      old: String(rc.rating_from), new: String(rc.rating_to), pct: '' });
  }
  return changes;
}

function buildMemberCell(m, gi) {
  var changes = getChangeSet(m);
  var hasChg  = changes && changes.length > 0;
  var lastTs  = getLastTs(m);
  var isMain  = _data && _data.groups && _data.groups[gi] && _data.groups[gi].main_asin === m.asin;

  var imgHTML = m.main_image
    ? '<img src="' + e(m.main_image) + '" alt="' + e(m.asin||'') + '">'
    : '<div class="ph"></div>';

  var html = '<div class="mcard' + (hasChg ? ' changed' : '') + '">';
  html += '<div class="mc-img">' + imgHTML + '</div>';
  html += '<div class="mc-body">';
  html += '<div class="mc-title-row">';
  html += '<span class="mc-title">' + e(m.title || m.asin || '') + '</span>';
  html += '</div>';
  html += '<div class="mc-asin">' + e(m.asin || '') + '</div>';
  html += '<div class="mc-metrics">';
  html += '<div class="mc-metric"><div class="mcm-l">Price</div><div class="mcm-v pc">' + fmtPrice(m.price) + '</div></div>';
  html += '<div class="mc-metric"><div class="mcm-l">Rating</div><div class="mcm-v rt">' + (m.rating != null ? m.rating : '---') + '</div></div>';
  html += '<div class="mc-metric"><div class="mcm-l">Reviews</div><div class="mcm-v">' + (m.review_count != null ? m.review_count.toLocaleString() : '---') + '</div></div>';
  html += '</div>';
  html += '<div class="mc-bsr">';
  if (m.bsr != null) {
    html += '<span class="mc-bsr-item"><span class="mcb-l">BSR</span><span class="mcb-v sort-key" data-col="bsr" data-val="' + m.bsr + '">#' + m.bsr.toLocaleString() + '</span></span>';
  }
  html += '</div>';
  html += '<div class="mc-status">';
  if (hasChg) {
    html += '<span class="as-warn">\u25cf ' + changes.length + ' changes</span>';
  } else {
    html += '<span class="as-stable">\u2713 Stable</span>';
  }
  html += '</div>';
  if (hasChg) {
    html += '<div class="mc-chgs">';
    changes.forEach(function(c) {
      html += '<div class="mc-chg-item">';
      html += '<span class="ci-label">' + e(c.label) + ':</span>';
      html += '<span class="ci-old">' + e(c.old) + '</span>';
      html += '<span class="ci-arrow">\u2192</span>';
      html += '<span class="ci-new">' + e(c.new) + '</span>';
      if (c.pct) html += '<span class="ci-pct">(' + c.pct + ')</span>';
      html += '</div>';
    });
    html += '<div class="mc-chart"><canvas id="cv_' + e(m.asin||'') + '"></canvas></div>';
    html += '</div>';
  }
  html += '</div></div>';
  return html;
}

function render() {
  var board = document.getElementById('board');
  if (!_data || !_data.groups) {
    board.innerHTML = '<div class="loading">No data. Run sync_groups.py first.</div>';
    return;
  }

  var sf = document.getElementById('sf') ? document.getElementById('sf').value.toLowerCase() : '';
  var sc = document.getElementById('sc') ? document.getElementById('sc').checked : false;
  var groups = _data.groups;

  /* Build flat member list for sort */
  var allRows = [];
  groups.forEach(function(g, gi) {
    var row = g.members.filter(function(m) {
      if (!m.asin) return false;
      if (sf && !(m.asin.toLowerCase().includes(sf) || (m.title||'').toLowerCase().includes(sf))) return false;
      if (sc) { var cs = getChangeSet(m); if (!cs || cs.length === 0) return false; }
      return true;
    });
    allRows.push({ gi: gi, members: row });
  });

  /* Sort each group independently */
  allRows.forEach(function(r) {
    r.members.sort(function(a, b) {
      var va = 0, vb = 0;
      if (_sortCol === 'bsr')        { va = a.bsr||999999; vb = b.bsr||999999; }
      else if (_sortCol === 'price') { va = a.price||0;   vb = b.price||0; }
      else if (_sortCol === 'price_chg') {
        var ca = getChange(a), cb = getChange(b);
        va = ca ? Math.abs(ca.price_pct) : 0; vb = cb ? Math.abs(cb.price_pct) : 0;
      }
      else if (_sortCol === 'bsr_chg') {
        var ba = getBSRChange(a), bb = getBSRChange(b);
        va = ba ? Math.abs(ba.bsr_diff) : 0; vb = bb ? Math.abs(bb.bsr_diff) : 0;
      }
      else if (_sortCol === 'rating')  { va = a.rating||0; vb = b.rating||0; }
      else if (_sortCol === 'reviews') { va = a.review_count||0; vb = b.review_count||0; }
      return (va > vb ? 1 : va < vb ? -1 : 0) * _sortDir;
    });
  });

  /* Build 5-column grid HTML */
  var html = '<div class="board-grid">';
  for (var col = 0; col < 5; col++) {
    var g = groups[col];
    var rows = allRows[col] ? allRows[col].members : [];
    html += '<div class="grid-col">';
    html += '<div class="col-hdr">';
    html += '<span class="col-hdr-asin">' + (g ? e(g.main_asin || '') : '---') + '</span>';
    html += '<span class="col-hdr-n">' + rows.length + ' items</span>';
    html += '</div>';
    if (g && rows.length > 0) {
      rows.forEach(function(m) { html += buildMemberCell(m, col); });
    } else {
      html += '<div class="empty-col">No data</div>';
    }
    html += '</div>';
  }
  html += '</div>';
  board.innerHTML = html;

  /* Draw sparklines */
  setTimeout(function() {
    allRows.forEach(function(r) {
      r.members.forEach(function(m) {
        var changes = getChangeSet(m);
        if (changes && changes.length > 0) drawMiniSparkline('cv_' + m.asin, m.history || []);
      });
    });
  }, 60);
}

function drawMiniSparkline(cid, history) {
  var canvas = document.getElementById(cid);
  if (!canvas) return;
  if (_charts[cid]) { _charts[cid].destroy(); _charts[cid] = null; }
  var prices = [], bsrData = [];
  history.forEach(function(h) {
    if (h.price != null) prices.push(h.price);
    if (h.bsr != null) bsrData.push(h.bsr);
  });
  if (!prices.length && !bsrData.length) return;
  var datasets = [];
  if (prices.length > 1) {
    datasets.push({ label:'Price', data:prices, borderColor:'#B12704', backgroundColor:'rgba(177,39,4,.04)', borderWidth:1.5, fill:true, tension:0.3, pointRadius:0, yAxisID:'y' });
  }
  if (bsrData.length > 1) {
    datasets.push({ label:'BSR', data:bsrData, borderColor:'#067d62', backgroundColor:'transparent', borderWidth:1.5, fill:false, tension:0.3, pointRadius:0, yAxisID:'y1' });
  }
  _charts[cid] = new Chart(canvas, {
    type:'line',
    data:{ labels:history.map(function(){return '';}), datasets:datasets },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:{
        x:{display:false},
        y:{position:'left', grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:8}, maxTicksLimit:3}},
        y1:{position:'right', grid:{display:false}, ticks:{font:{size:8}, maxTicksLimit:3}}
      }
    }
  });
}

function exportXlsx() {
  if (!_data || !_data.groups) return;
  var wb = XLSX.utils.book_new();
  var rows = [['ASIN','Title','Brand','Price','BSR Main','BSR Sub','Rating','Reviews','Seller','Changes','Last Updated']];
  _data.groups.forEach(function(g) {
    g.members.forEach(function(m) {
      var changes = getChangeSet(m);
      var chStr = changes && changes.length ? changes.map(function(c){ return c.label + ':' + c.old + '->' + c.new; }).join('; ') : '';
      rows.push([m.asin||'', (m.title||'').substring(0,80), m.brand||'', m.price||'', m.bsr||'', m.bsr_sub_rank||'',
        m.rating||'', m.review_count||'', m.seller||'', chStr, getLastTs(m)]);
    });
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:14},{wch:50},{wch:20},{wch:8},{wch:10},{wch:10},{wch:8},{wch:10},{wch:20},{wch:40},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, 'Monitor Data');
  XLSX.writeFile(wb, 'crossmart_monitor_' + new Date().toISOString().substring(0,10) + '.xlsx');
}

/* ── Column header sort click ── */
document.addEventListener('click', function(e) {
  var sk = e.target.closest('.sort-key');
  if (!sk) return;
  var col = sk.dataset.col;
  if (!col) return;
  if (_sortCol === col) { _sortDir *= -1; }
  else { _sortCol = col; _sortDir = 1; }
  render();
});

initMonitor(window.MONITOR_EMBED || {});
</script>
