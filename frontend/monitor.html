<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart Advanced Monitor Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.container { max-width: 1400px; margin: 0 auto; padding: 20px; }
/* Header */
.header { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; margin-bottom: 24px; }
.header h1 { font-size: 22px; font-weight: 700; color: #38bdf8; }
.header h1 span { color: #fbbf24; }
.token-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.token-row label { font-size: 13px; color: #94a3b8; white-space: nowrap; }
.token-row input { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 13px; width: 280px; }
.token-row input:focus { outline: none; border-color: #38bdf8; }
.token-row small { color: #64748b; font-size: 11px; }
/* Config Bar */
.config-bar { background: #1e293b; border-radius: 12px; padding: 16px; margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 12px; align-items: flex-end; }
.config-item { display: flex; flex-direction: column; gap: 4px; }
.config-item label { font-size: 11px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.05em; }
.config-item input, .config-item select { background: #0f172a; border: 1px solid #334155; color: #e2e8f0; padding: 7px 10px; border-radius: 6px; font-size: 13px; }
.config-item input:focus, .config-item select:focus { outline: none; border-color: #38bdf8; }
.btn-row { display: flex; gap: 8px; align-items: center; margin-left: auto; flex-wrap: wrap; }
.btn { padding: 8px 16px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px; font-weight: 600; transition: all 0.15s; }
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: #10b981; color: white; }
.btn-success:hover { background: #059669; }
.btn-outline { background: transparent; color: #94a3b8; border: 1px solid #334155; }
.btn-outline:hover { border-color: #38bdf8; color: #38bdf8; }
.status-badge { font-size: 12px; padding: 4px 10px; border-radius: 20px; background: #334155; color: #94a3b8; display: none; }
.status-badge.active { background: #065f46; color: #34d399; display: inline-block; }
.status-badge.error { background: #450a0a; color: #f87171; display: inline-block; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }
/* Filters */
.filters { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
.filters input, .filters select { background: #1e293b; border: 1px solid #334155; color: #e2e8f0; padding: 6px 10px; border-radius: 6px; font-size: 13px; }
#searchInput { width: 200px; }
.filters label { font-size: 12px; color: #64748b; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.filters input[type="checkbox"] { width: auto; accent-color: #3b82f6; }
/* Table */
.table-wrap { background: #1e293b; border-radius: 12px; overflow: hidden; }
table { width: 100%; border-collapse: collapse; }
th { background: #0f172a; padding: 10px 12px; text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; position: sticky; top: 0; z-index: 10; }
td { padding: 10px 12px; border-bottom: 1px solid #334155; vertical-align: top; font-size: 13px; }
/* Column widths */
.col-img { width: 70px; }
.col-img img { width: 50px; height: 50px; object-fit: cover; border-radius: 6px; background: #0f172a; }
.col-info { min-width: 200px; }
.col-metrics { min-width: 140px; }
.col-events { min-width: 150px; }
.col-trend { min-width: 120px; }
.col-status { width: 90px; }
.col-updated { width: 120px; font-size: 11px; color: #64748b; }
/* Row highlight */
tr:hover { background: #334155; }
tr.changed-row { background: #1c1c1c; }
/* Badges */
.badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; text-transform: uppercase; }
.source-asin { background: #1e3a5f; color: #38bdf8; }
.source-keyword { background: #1e3a1e; color: #4ade80; }
.main { background: #4a2c08; color: #fbbf24; }
.rel { background: #1e293b; color: #94a3b8; }
.bsr-rank { background: #0c1a2e; color: #60a5fa; font-size: 11px; padding: 2px 6px; border-radius: 4px; }
.badge-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; margin-right: 3px; margin-top: 2px; }
.badge-tag.bs { background: #0f172a; color: #f59e0b; border: 1px solid #f59e0b; }
.badge-tag.ac { background: #0f172a; color: #10b981; border: 1px solid #10b981; }
.badge-tag.aplus { background: #0f172a; color: #a78bfa; border: 1px solid #a78bfa; }
.badge-tag.lost { background: #2a1a1a; color: #f87171; border: 1px solid #f87171; text-decoration: line-through; }
/* Info block */
.info-block > div { margin-bottom: 3px; }
.asin-link { color: #38bdf8; text-decoration: none; font-size: 12px; }
.asin-link:hover { text-decoration: underline; }
.title-text { color: #e2e8f0; font-size: 13px; max-width: 300px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
/* Metrics block */
.metrics-block > div { margin-bottom: 3px; font-size: 12px; }
/* Events */
.events-cell { font-size: 11px; line-height: 1.6; }
.e-tag { display: inline-block; padding: 1px 5px; border-radius: 3px; margin-right: 3px; margin-bottom: 2px; font-size: 10px; }
.e-alert { background: #450a0a; color: #f87171; }
.e-promo { background: #1c2a1c; color: #86efac; }
.e-none { color: #334155; }
/* Trend */
.trend-container { min-width: 90px; }
.trend-label { font-size: 10px; color: #64748b; margin-bottom: 2px; }
/* Status indicator */
.status-indicator { padding: 3px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; text-align: center; }
.status-indicator.changed { background: #450a0a; color: #f87171; }
.status-indicator.ok { background: #022c22; color: #4ade80; }
/* Chg */
.chg { font-size: 10px; padding: 1px 4px; border-radius: 3px; margin-left: 3px; }
.chg.up { background: #14532d; color: #4ade80; }
.chg.dn { background: #450a0a; color: #f87171; }
/* Sparkline */
canvas { display: block; }
/* cat item */
.cat-item { padding: 1px 4px; border-radius: 3px; background: #0f172a; color: #94a3b8; font-size: 10px; }
.cat-item.err { background: #450a0a; color: #f87171; }
/* Empty state */
.empty-state { text-align: center; padding: 60px 0; color: #475569; font-size: 14px; }
/* Responsive */
@media(max-width: 900px) {
  .col-events, .col-trend, .col-updated { display: none; }
  th, td { padding: 8px 6px; }
}
@media(max-width: 600px) {
  .config-bar { flex-direction: column; }
  .btn-row { margin-left: 0; width: 100%; }
  .col-trend { display: none; }
}
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>CrossMart <span>Monitor</span></h1>
    <div class="token-row">
      <label>GitHub Token:</label>
      <input type="password" id="ghTokenInput" placeholder="ghp_..." />
      <small>Token 存储在本地，不会上传</small>
    </div>
  </div>

  <div class="config-bar">
    <div class="config-item">
      <label>ASIN</label>
      <input type="text" id="asinInput" placeholder="B09V7Z4TJG" />
    </div>
    <div class="config-item">
      <label>关键词</label>
      <input type="text" id="keywordInput" placeholder="toner pad" />
    </div>
    <div class="config-item">
      <label>监控频率</label>
      <select id="freqSelect">
        <option value="1">每 1 小时</option>
        <option value="6">每 6 小时</option>
        <option value="12">每 12 小时</option>
        <option value="24">每 24 小时</option>
      </select>
    </div>
    <div class="btn-row">
      <span id="statusBadge" class="status-badge">抓取中...</span>
      <button class="btn btn-success" id="btnTrigger" onclick="triggerMonitor()">⚡ 立即抓取</button>
      <button class="btn btn-outline" id="btnRefresh" onclick="loadRawData()">🔄 刷新数据</button>
      <button class="btn btn-primary" id="btnExport" onclick="exportToExcel()">📊 导出 Excel</button>
    </div>
  </div>

  <div class="filters">
    <input type="text" id="searchInput" placeholder="搜索 ASIN / 产品名..." oninput="renderTable()" />
    <select id="sourceFilter" onchange="renderTable()">
      <option value="ALL">全部来源</option>
      <option value="ASIN">ASIN Stream</option>
      <option value="关键词">关键词追踪</option>
    </select>
    <label><input type="checkbox" id="changeFilter" onchange="renderTable()" /> 仅看异动商品</label>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-img">图片</th>
          <th class="col-info">商品信息</th>
          <th class="col-metrics">核心指标</th>
          <th class="col-events">事件 / 异动</th>
          <th class="col-trend">趋势图</th>
          <th class="col-status">状态</th>
          <th class="col-updated">更新时间</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="7" class="empty-state">正在加载监控数据...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
// ─── Configuration ───────────────────────────────────────────────
const CONFIG_KEY = 'crossmart_monitor_v1';
const REPO = 'charlescome1995-prog/crossmart-monitor';
const RAW_DATA_URL = 'https://raw.githubusercontent.com/' + REPO + '/main/frontend/data/rawData.json';
const POLL_INTERVAL = 5000;

// ─── Global State ────────────────────────────────────────────────
let rawData = { updated: '', items: [] };
let pollTimer = null;

// ─── Utilities ───────────────────────────────────────────────────
function b64enc(s) {
  return btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g, function(_, p) {
    return String.fromCharCode(parseInt(p, 16));
  }));
}

// ─── GitHub Contents API ──────────────────────────────────────────
async function putFile(path, content) {
  const token = localStorage.getItem('gh_token') || '';
  const url = 'https://api.github.com/repos/' + REPO + '/contents/' + path;
  let sha = '';
  try {
    const r = await fetch(url, {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (r.ok) { const d = await r.json(); sha = d.sha; }
  } catch(e) {}
  const body = JSON.stringify({ message: 'Update ' + path, content: b64enc(content), sha });
  const resp = await fetch(url, {
    method: 'PUT',
    headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body
  });
  if (!resp.ok) {
    const err = await resp.json().catch(() => ({}));
    throw new Error(resp.status + ' ' + (err.message || ''));
  }
  return resp.json();
}

// ─── Trigger Monitor ─────────────────────────────────────────────
async function triggerMonitor() {
  const asin = document.getElementById('asinInput').value.trim();
  const keyword = document.getElementById('keywordInput').value.trim();
  const freq = document.getElementById('freqSelect').value;
  const token = localStorage.getItem('gh_token') || '';
  if (!token) { alert('请先输入 GitHub Token'); return; }
  if (!asin && !keyword) { alert('请输入 ASIN 或关键词'); return; }

  const btn = document.getElementById('btnTrigger');
  btn.disabled = true;
  document.getElementById('statusBadge').textContent = '配置保存中...';
  document.getElementById('statusBadge').className = 'status-badge active';

  try {
    const cfg = { asins: asin ? asin.split(',').map(s => s.trim()).filter(Boolean) : [], keywords: keyword ? keyword.split(',').map(s => s.trim()).filter(Boolean) : [], freq: parseInt(freq) };
    await putFile('backend/data/user_config.json', JSON.stringify(cfg, null, 2));
    await putFile('backend/data/trigger.json', JSON.stringify({ triggered_at: new Date().toISOString(), status: 'pending' }, null, 2));
    document.getElementById('statusBadge').textContent = '抓取已触发，等待完成...';
    startPolling();
  } catch(e) {
    document.getElementById('statusBadge').textContent = '错误: ' + e.message;
    document.getElementById('statusBadge').className = 'status-badge error';
    btn.disabled = false;
  }
}

function startPolling() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(checkStatus, POLL_INTERVAL);
}

async function checkStatus() {
  const token = localStorage.getItem('gh_token') || '';
  if (!token) return;
  try {
    const resp = await fetch('https://api.github.com/repos/' + REPO + '/contents/backend/data/trigger.json', {
      headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (!resp.ok) return;
    const data = await resp.json();
    const content = JSON.parse(atob(data.content));
    if (content.status === 'done') {
      clearInterval(pollTimer); pollTimer = null;
      const btn = document.getElementById('btnTrigger');
      btn.disabled = false;
      document.getElementById('statusBadge').textContent = '✅ 抓取完成';
      document.getElementById('statusBadge').className = 'status-badge active';
      setTimeout(() => { document.getElementById('statusBadge').className = 'status-badge'; }, 3000);
      loadRawData();
    } else if (content.status === 'error') {
      clearInterval(pollTimer); pollTimer = null;
      const btn = document.getElementById('btnTrigger');
      btn.disabled = false;
      document.getElementById('statusBadge').textContent = '❌ 抓取失败';
      document.getElementById('statusBadge').className = 'status-badge error';
    }
  } catch(e) {}
}

// ─── Apply Config ────────────────────────────────────────────────
function applyConfig(cfg) {
  if (!cfg) return;
  if (cfg.asins && cfg.asins.length) document.getElementById('asinInput').value = cfg.asins.join(', ');
  if (cfg.keywords && cfg.keywords.length) document.getElementById('keywordInput').value = cfg.keywords.join(', ');
  if (cfg.freq) {
    const opt = document.querySelector('#freqSelect option[value="' + cfg.freq + '"]');
    if (opt) document.getElementById('freqSelect').value = cfg.freq;
  }
}

// ─── Init Config Button ──────────────────────────────────────────
function initConfigBtn() {
  const saved = localStorage.getItem(CONFIG_KEY);
  if (saved) {
    try { applyConfig(JSON.parse(saved)); } catch(e) {}
  }
}

// ─── Load Data ───────────────────────────────────────────────────
function loadRawData() {
  console.log('[loadRawData] starting fetch from', RAW_DATA_URL);
  fetch(RAW_DATA_URL + '?t=' + Date.now())
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(d) {
      rawData = d;
      console.log('[loadRawData] fetched', d.items ? d.items.length : 0, 'items, calling renderTable');
      renderTable();
    })
    .catch(function(e) {
      console.warn('[loadRawData] failed:', e.message);
      renderTable();
    });
}

// ─── Draw Sparkline ──────────────────────────────────────────────
function drawSparkline(data, color) {
  if (!data || data.length < 2) return '<span style="color:#475569;font-size:10px;">数据不足</span>';
  const w = 90, h = 30;
  const min = Math.min.apply(null, data);
  const max = Math.max.apply(null, data);
  const range = max - min || 1;
  const pts = data.map(function(v, i) {
    return (i * w / (data.length - 1)) + ',' + (h - ((v - min) / range * h));
  }).join(' ');
  return '<svg width="' + w + '" height="' + h + '" style="display:block"><polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5" stroke-linejoin="round"/></svg>';
}

// ─── Render Table ────────────────────────────────────────────────
function renderTable() {
  if (!rawData || !rawData.items) {
    console.warn('renderTable: rawData or rawData.items is null, skipping');
    return;
  }
  const tbody = document.getElementById('tableBody');
  if (!tbody) { console.warn('renderTable: tableBody not found'); return; }

  const searchTxt = document.getElementById('searchInput').value.toLowerCase();
  const sourceFilter = document.getElementById('sourceFilter').value;
  const onlyChg = document.getElementById('changeFilter').checked;

  let html = '';

  rawData.items.forEach(function(item) {
    var isStatusAnomaly = item.listing_status !== item.expected_listing_status;
    var isCatAnomaly = (item.main_cat !== item.expected_main_cat) || (item.sub_cat !== item.expected_sub_cat);
    var isInfoAnomaly = item.title_changed || item.img_changed || item.bullets_changed || item.description_changed;
    var isVariantAnomaly = item.variant_changed;
    var hasActiveAnomaly = item.chg !== 0 || isStatusAnomaly || isCatAnomaly || isInfoAnomaly || isVariantAnomaly;

    if (sourceFilter !== 'ALL' && item.monitor_type !== sourceFilter) return;
    var matchesSearch = item.asin && item.asin.toLowerCase().includes(searchTxt);
    if (!matchesSearch && item.title && item.title.toLowerCase().includes(searchTxt)) matchesSearch = true;
    if (!matchesSearch) return;
    if (onlyChg && !hasActiveAnomaly) return;

    var activeEvents = item.events ? item.events.slice() : [];
    if (isStatusAnomaly) activeEvents.push({ class: 'e-alert', text: '状态异常: 变为' + item.listing_status });
    if (item.title_changed) activeEvents.push({ class: 'e-alert', text: '标题发生变化' });
    if (item.img_changed) activeEvents.push({ class: 'e-alert', text: '主图发生变化' });
    if (item.bullets_changed) activeEvents.push({ class: 'e-alert', text: '五点描述发生变化' });
    if (item.description_changed) activeEvents.push({ class: 'e-alert', text: '产品描述发生变化' });
    if (isCatAnomaly) activeEvents.push({ class: 'e-alert', text: '类目节点异常' });
    if (isVariantAnomaly) activeEvents.push({ class: 'e-alert', text: '变体异常: ' + item.variant_status });

    var chgClass = item.chg > 0 ? 'up' : (item.chg < 0 ? 'dn' : '');
    var chgText = item.chg > 0 ? '+$' + item.chg : (item.chg < 0 ? '-$' + Math.abs(item.chg) : '');

    var sourceHtml = item.monitor_type === 'ASIN' ? '<span class="badge source-asin">ASIN Stream</span>' : '<span class="badge source-keyword">关键词追踪</span>';

    var statusTextHtml = item.listing_status === '正常' ? '<span style="color:#16a34a; font-weight:700;">[正常]</span>' : '<span style="color:#ef4444; font-weight:700;">[异常]</span>';
    var eventsHtml = '<span class="e-none">暂无异动</span>';
    if (activeEvents.length > 0) eventsHtml = activeEvents.map(function(e) { return '<span class="e-tag ' + e.class + '">' + e.text + '</span>'; }).join('');
    var statusHtml = hasActiveAnomaly ? '<div class="status-indicator changed">有异动</div>' : '<div class="status-indicator ok">正常</div>';

    html += '<tr' + (hasActiveAnomaly ? ' class="changed-row"' : '') + '>' +
      '<td class="col-img"><img src="' + (item.img || '') + '" alt="Product Picture" onerror="this.src=\'data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 50 50%22><rect fill=%22%231e293b%22 width=%2250%22 height=%2250%22/><text x=%2225%22 y=%2228%22 text-anchor=%22middle%22 fill=%22%23475569%22 font-size=%2210%22>?</text></svg>\'" /></td>' +
      '<td class="col-info"><div><div><span class="badge ' + (item.is_main ? 'main' : 'rel') + '">' + (item.logic_type || '') + '</span> ' + statusTextHtml + ' <a href="https://www.amazon.com/dp/' + (item.asin || '') + '" target="_blank" class="asin-link">' + (item.asin || '') + '</a></div><div class="title-text" title="' + (item.title || '') + '">' + (item.title || '') + '</div></div></td>' +
      '<td class="col-metrics"><div class="metrics-block"><div>价格: <strong>$' + (item.price != null ? item.price.toFixed(2) : '-') + '</strong> <span class="chg ' + chgClass + '">' + chgText + '</span></div><div>评分: <strong>' + (item.rating || '-') + '</strong> (' + (item.reviews != null ? item.reviews.toLocaleString() : '-') + ' 条)</div><div>排名: <span class="bsr-rank">#' + (item.main_bsr || '-') + '</span> / <span class="bsr-rank">#' + (item.sub_bsr || '-') + '</span></div><div>类目: <span class="cat-item ' + (isCatAnomaly ? 'err' : '') + '">' + (item.main_cat || '') + '</span></div></div></td>' +
      '<td class="col-events"><div class="events-cell">' + eventsHtml + '</div></td>' +
      '<td class="col-trend"><div class="trend-container">' + drawSparkline(item.history_main_bsr, '#1e3a8a') + '</div></td>' +
      '<td class="col-status">' + statusHtml + '</td>' +
      '<td class="col-updated">' + (rawData.updated || '') + '</td>' +
      '</tr>';
  });

  if (!html) html = '<tr><td colspan="7" class="empty-state">未检测到任何匹配的商品</td></tr>';
  tbody.innerHTML = html;
}

// ─── Export to Excel ────────────────────────────────────────────
function exportToExcel() {
  var rows = [['来源', 'ASIN', '逻辑标签', 'Listing状态', '产品标题', '品牌', '当前排名', '变体状态', '价格变化', '当前价格', '评分', '评论数']];
  rawData.items.forEach(function(m) {
    var isStatusAnomaly = m.listing_status !== m.expected_listing_status;
    var isCatAnomaly = (m.main_cat !== m.expected_main_cat) || (m.sub_cat !== m.expected_sub_cat);
    var isInfoAnomaly = m.title_changed || m.img_changed || m.bullets_changed || m.description_changed;
    var isVariantAnomaly = m.variant_changed;
    var statusText = (m.chg !== 0 || isStatusAnomaly || isCatAnomaly || isInfoAnomaly || isVariantAnomaly) ? '异常' : '正常';
    rows.push([m.monitor_type, m.asin, m.logic_type, m.listing_status, m.title, m.brand, m.main_bsr, m.variant_status, m.chg, m.price, m.rating, m.reviews]);
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'MonitorReport');
  XLSX.writeFile(wb, 'CrossMart_Report_' + (rawData.updated || Date.now()) + '.xlsx');
}

// ─── Page Startup ────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', function() {
  var tokenInput = document.getElementById('ghTokenInput');
  if (tokenInput) {
    var saved = localStorage.getItem('gh_token') || '';
    if (saved) tokenInput.value = saved;
    tokenInput.addEventListener('input', function() {
      localStorage.setItem('gh_token', tokenInput.value.trim());
    });
  }
  initConfigBtn();
  loadRawData();
  // Deferred save on config change
  var inputs = document.querySelectorAll('#asinInput, #keywordInput, #freqSelect');
  inputs.forEach(function(inp) {
    inp.addEventListener('change', function() {
      var cfg = { asins: document.getElementById('asinInput').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean), keywords: document.getElementById('keywordInput').value.split(',').map(function(s) { return s.trim(); }).filter(Boolean), freq: parseInt(document.getElementById('freqSelect').value) };
      localStorage.setItem(CONFIG_KEY, JSON.stringify(cfg));
    });
  });
});
</script>
</body>
</html>
