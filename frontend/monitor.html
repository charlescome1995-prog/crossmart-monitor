<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
/* ─── Top Bar ─── */
.topbar{background:#131921;color:#fff;display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 24px;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:16px}
.topbar nav{display:flex;gap:14px;font-size:13px}
.topbar nav a{color:rgba(255,255,255,.75);text-decoration:none;padding:4px 0;border-bottom:2px solid transparent;transition:.15s}
.topbar nav a:hover,.topbar nav a.active{color:#fff;border-bottom-color:#e94560}

/* ─── Filter Bar ─── */
.filters{background:#fff;padding:8px 16px;display:flex;gap:8px;align-items:center;border-bottom:1px solid #d5d9d9;position:sticky;top:48px;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap}
.filters input{padding:5px 10px;border:1px solid #d5d9d9;border-radius:6px;font-size:12px;width:140px}
.filters select{padding:5px 10px;border:1px solid #d5d9d9;border-radius:6px;font-size:12px}
.filters label{font-size:12px;color:#555;display:flex;align-items:center;gap:4px;cursor:pointer}
.btn{display:inline-flex;align-items:center;padding:4px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:none;transition:.15s;background:#e6e8ea;color:#0f1111}
.btn:hover{background:#d5d9d9}
.btn-p{background:#ffd814;color:#0f1111}.btn-p:hover{background:#f7ca00}
.btn-sm{padding:3px 8px;font-size:10px}

/* ─── Table Layout ─── */
.board-wrap{padding:12px;overflow-x:auto}
.board{width:100%;border-collapse:collapse;font-size:12px;background:#fff;white-space:nowrap}
.board th{background:#f5f5f5;padding:8px 10px;text-align:left;font-size:10px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.5px;border-bottom:2px solid #e0e0e0;position:sticky;top:0;z-index:10}
.board th:first-child{width:90px;min-width:90px}
.board td{padding:0;border-bottom:1px solid #f0f0f0;vertical-align:middle}
.board tr:hover td{background:#f9f9f9}
.board tr:last-child td{border-bottom:none}

/* Image cell */
.board .td-img{width:90px;min-width:90px;padding:6px 8px}
.board .td-img img{width:72px;height:72px;object-fit:cover;border-radius:6px;display:block;border:1px solid #eee}

/* ASIN cell */
.board .td-asin{font-size:10px;font-weight:700;color:#007185;padding:6px 8px}

/* Title cell */
.board .td-title{min-width:200px;max-width:280px;padding:6px 8px}
.board .td-title .title-text{overflow:hidden;text-over话说-overflow:ellipsis;font-size:11px;font-weight:600;color:#0f1111;max-width:280px}

/* Brand */
.board .td-brand{min-width:100px;padding:6px 8px;font-size:10px;color:#888}

/* Price */
.board .td-price{min-width:80px;padding:6px 8px;text-align:right}
.board .td-price .price{font-size:14px;font-weight:700;color:#B12704}
.board .td-price .list{font-size:10px;color:#888;text-decoration:line-through;margin-left:4px}

/* Change */
.board .td-chg{min-width:70px;padding:6px 8px;text-align:center}
.board .chg{padding:2px 6px;border-radius:4px;font-size:10px;font-weight:700}
.board .chg.up{color:#059669;background:#f0fdf4}
.board .chg.dn{color:#dc2626;background:#fef2f2}
.board .chg.flat{color:#999;background:#f5f5f5}

/* BSR */
.board .td-bsr{min-width:80px;padding:6px 8px;text-align:right}
.board .bsr{font-size:13px;font-weight:700;color:#067d62}
.board .bsr-sub{font-size:10px;color:#888}

/* Rating */
.board .td-rating{min-width:80px;padding:6px 8px;text-align:center}
.board .rating{font-size:13px;font-weight:700;color:#d99536}

/* Reviews */
.board .td-reviews{min-width:80px;padding:6px 8px;text-align:right;font-size:13px;font-weight:600}

/* Seller */
.board .td-seller{min-width:120px;padding:6px 8px;font-size:10px;color:#555;max-width:150px;overflow:hidden;text-overflow:ellipsis}

/* Row group badge */
.board .td-group{padding:6px 8px;text-align:center}
.board .grp-badge{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;background:#e94560;color:#fff;font-size:10px;font-weight:700}

/* Loading / empty */
.loading{text-align:center;padding:40px;color:#999;font-size:13px}

/* ─── Detail View ─── */
.detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;display:none;align-items:center;justify-content:center;padding:20px}
.detail-overlay.open{display:flex}
.detail-panel{background:#fff;border-radius:14px;width:100%;max-width:900px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.detail-hdr{padding:16px 20px;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#fff;z-index:10;border-radius:14px 14px 0 0}
.detail-hdr .dh-title{font-size:14px;font-weight:700;color:#131921}
.detail-hdr .dh-sub{font-size:11px;color:#888;margin-top:2px}
.detail-hdr .dh-close{width:32px;height:32px;border-radius:50%;background:#f5f5f5;border:none;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.detail-hdr .dh-close:hover{background:#e0e0e0}
.detail-body{padding:0}
.detail-group{padding:14px 20px;border-bottom:1px solid #f0f2f2}
.detail-group:last-child{border-bottom:none}
.detail-group.main-g{background:#fffbe6}
.detail-group .dg-name{display:flex;align-items:center;gap:8px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid #eee;flex-wrap:wrap}
.detail-group .dg-name .asinh{font-size:12px;font-weight:700;color:#007185}
.detail-group .dg-name .asintitle{font-size:10px;color:#888;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:100px}
.detail-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:10px}
.dm{background:#f9f9f9;border-radius:8px;padding:8px 10px;text-align:center}
.dm .dml{font-size:9px;color:#888;font-weight:600;text-transform:uppercase;margin-bottom:3px}
.dm .dmv{font-size:15px;font-weight:800;color:#131921;word-break:break-all}
.dm .dmv.pc{color:#B12704}.dm .dmv.rt{color:#d99536}.dm .dmv.bsr{color:#067d62}
.detail-chart-wrap{padding:0 4px;height:120px}
.detail-chart-wrap canvas{max-height:120px!important}
.detail-history{margin-top:8px;font-size:10px;color:#aaa;text-align:right}

@media(max-width:900px){
  .board{font-size:11px}
  .board .td-title{min-width:150px;max-width:200px}
}

</style>
</head>
<body>
<div class="topbar">
  <span class="brand">Cross<span style="color:#e94560">Mart</span></span>
  <nav>
    <a href="../index.html">Home</a>
    <a href="monitor.html" class="active">Monitor</a>
    <a href="selection.html">Selection</a>
  </nav>
</div>

<div class="filters">
  <input type="text" id="sf" placeholder="&#x1F50D; Search ASIN or title..." oninput="render()">
  <select id="ss" onchange="render()">
    <option value="bsr">BSR &#x2B06;</option>
    <option value="price_chg">Price Change</option>
    <option value="bsr_chg">BSR Change</option>
    <option value="price">Price &#x2B07;</option>
  </select>
  <label><input type="checkbox" id="sc" onchange="render()"> Changes only</label>
  <button class="btn btn-sm" onclick="refresh()">&#x1F504; Refresh</button>
  <button class="btn btn-sm btn-p" onclick="exportXlsx()">&#x1F4E5; Export Excel</button>
</div>

<div class="board-wrap">
<table class="board" id="board">
  <thead>
    <tr>
      <th>Image</th>
      <th>ASIN</th>
      <th>Title</th>
      <th>Brand</th>
      <th>Price</th>
      <th>Chg</th>
      <th>BSR</th>
      <th>Sub BSR</th>
      <th>Rating</th>
      <th>Reviews</th>
      <th>Seller</th>
      <th>Grp</th>
    </tr>
  </thead>
  <tbody id="boardBody"><tr><td colspan="12" class="loading">&#x231B; Loading...</td></tr></tbody>
</table>
</div>

<div id="detail" class="detail-overlay" onclick="if(event.target===this)closeDetail()">
  <div class="detail-panel">
    <div class="detail-hdr">
      <div>
        <div class="dh-title" id="dtTitle">ASIN Detail</div>
        <div class="dh-sub" id="dtSub"></div>
      </div>
      <button class="dh-close" onclick="closeDetail()">&#x2715;</button>
    </div>
    <div id="dtBody" class="detail-body"></div>
  </div>
</div>

<script>

/* global MONITOR_EMBED, Chart, XLSX */
var _data = null;
var _charts = {};
var _sortKey = 'bsr';
var _sortAsc = false;
var _filterText = '';
var _changesOnly = false;

function initMonitor(data) {
  _data = data;
  render();
}

function refresh() {
  initMonitor(window.MONITOR_EMBED || {});
}

function getAllAsins() {
  var all = [];
  if (!_data || !_data.groups) return all;
  _data.groups.forEach(function(g, gi) {
    g.members.forEach(function(m) {
      if (m.asin) {
        all.push({ m: m, g: g, gi: gi });
      }
    });
  });
  return all;
}

function sortAsins(list) {
  var key = _sortKey;
  var asc = _sortAsc;
  list.sort(function(a, b) {
    var va, vb;
    if (key === 'title') {
      va = (a.m.title||'').toLowerCase();
      vb = (b.m.title||'').toLowerCase();
      return asc ? va.localeCompare(vb) : vb.localeCompare(va);
    } else if (key === 'price') {
      va = a.m.price || 0;
      vb = b.m.price || 0;
      return asc ? va - vb : vb - va;
    } else if (key === 'price_chg') {
      va = getChange(a.m);
      vb = getChange(b.m);
      return asc ? va - vb : vb - va;
    } else if (key === 'bsr_chg') {
      va = a.m.bsr_change || 0;
      vb = b.m.bsr_change || 0;
      return asc ? va - vb : vb - va;
    } else if (key === 'rating') {
      va = parseFloat(a.m.rating) || 0;
      vb = parseFloat(b.m.rating) || 0;
      return asc ? va - vb : vb - va;
    } else if (key === 'reviews') {
      va = a.m.review_count || 0;
      vb = b.m.review_count || 0;
      return asc ? va - vb : vb - va;
    } else if (key === 'seller') {
      va = (a.m.seller||'').toLowerCase();
      vb = (b.m.seller||'').toLowerCase();
      return asc ? va.localeCompare(vb) : vb.localeCompare(va);
    }
    // default bsr
    va = a.m.bsr || 999999;
    vb = b.m.bsr || 999999;
    return asc ? va - vb : vb - va;
  });
  return list;
}

function filterAsins(list) {
  var txt = _filterText.toLowerCase();
  return list.filter(function(item) {
    if (!txt) return true;
    if ((item.m.asin||'').toLowerCase().indexOf(txt) !== -1) return true;
    if ((item.m.title||'').toLowerCase().indexOf(txt) !== -1) return true;
    if ((item.m.brand||'').toLowerCase().indexOf(txt) !== -1) return true;
    return false;
  });
}

function render() {
  var tbody = document.getElementById('boardBody');
  if (!_data || !_data.groups) {
    tbody.innerHTML = '<tr><td colspan="12" class="loading">No data. Run sync_groups.py first.</td></tr>';
    return;
  }

  _sortKey = document.getElementById('ss').value;
  _filterText = document.getElementById('sf').value;
  _changesOnly = document.getElementById('sc').checked;

  var list = getAllAsins();
  list = filterAsins(list);

  if (_changesOnly) {
    list = list.filter(function(item){ return getChange(item.m) !== 0; });
  }

  list = sortAsins(list);

  if (list.length === 0) {
    tbody.innerHTML = '<tr><td colspan="12" class="loading">No results found.</td></tr>';
    return;
  }

  var html = '';
  list.forEach(function(item) {
    var m = item.m;
    var g = item.g;
    var ch = getChange(m);
    var chClass = ch > 0 ? 'up' : ch < 0 ? 'dn' : 'flat';
    var chTxt = ch === 0 ? '0' : (ch > 0 ? '+' + ch.toFixed(2) : ch.toFixed(2));
    var price = m.price ? '$' + m.price.toFixed(2) : '---';
    var bsr = m.bsr ? '#' + m.bsr.toLocaleString() : '---';
    var bsrSub = m.bsr_sub_rank ? '#' + m.bsr_sub_rank.toLocaleString() : '---';
    var rating = m.rating || '---';
    var reviews = m.review_count ? m.review_count.toLocaleString() : '---';
    var imgHTML = m.main_image
      ? '<img src="' + m.main_image + '" alt="' + e(m.asin||'') + '">'
      : '';
    var isMain = m.asin === g.main_asin;

    html += '<tr onclick="openDetail(' + item.gi + ',' + (g.members.indexOf(m)) + ')">';
    html += '<td class="td-img">' + imgHTML + '</td>';
    html += '<td class="td-asin">' + (m.asin||'') + '</td>';
    html += '<td class="td-title"><div class="title-text">' + e(m.title||'') + '</div></td>';
    html += '<td class="td-brand">' + e(m.brand||'') + '</td>';
    html += '<td class="td-price">';
    html += '<span class="price">' + price + '</span>';
    if (m.list_price) html += '<span class="list">$' + m.list_price.toFixed(2) + '</span>';
    html += '</td>';
    html += '<td class="td-chg"><span class="chg ' + chClass + '">' + chTxt + '</span></td>';
    html += '<td class="td-bsr"><div class="bsr">' + bsr + '</div></td>';
    html += '<td class="td-bsr"><div class="bsr-sub">' + bsrSub + '</div></td>';
    html += '<td class="td-rating"><span class="rating">&#9733; ' + rating + '</span></td>';
    html += '<td class="td-reviews">' + reviews + '</td>';
    html += '<td class="td-seller" title="' + e(m.seller||'') + '">' + e(m.seller||'---') + '</td>';
    html += '<td class="td-group"><span class="grp-badge" title="Group: ' + g.main_asin + '">' + g.members.length + '</span></td>';
    html += '</tr' + '\n';
  });

  tbody.innerHTML = html;
}

function openDetail(gi, memberIdx) {
  var g = _data && _data.groups ? _data.groups[gi] : null;
  if (!g) return;
  var m = g.members[memberIdx !== undefined ? memberIdx : 0];
  if (!m) return;

  document.getElementById('dtTitle').textContent = 'Group: ' + (g.main_asin||'');
  document.getElementById('dtSub').textContent = g.members.length + ' ASINs in group';

  var ch = getChange(m);
  var chClass = ch > 0 ? 'up' : ch < 0 ? 'dn' : 'flat';
  var chTxt = ch === 0 ? 'stable' : (ch > 0 ? '+' + ch.toFixed(2) : ch.toFixed(2));
  var price = m.price ? '$' + m.price.toFixed(2) : '---';
  var bsr = m.bsr ? '#' + m.bsr.toLocaleString() : '---';
  var bsrSub = m.bsr_sub_rank ? '#' + m.bsr_sub_rank.toLocaleString() : '';
  var rating = m.rating || '---';
  var reviews = m.review_count ? m.review_count.toLocaleString() : '---';
  var isMain = m.asin === g.main_asin;

  var html = '<div class="detail-group' + (isMain ? ' main-g' : '') + '">';
  html += '<div class="dg-name">';
  html += '<span class="asinh">' + (isMain ? '&#9733; ' : '') + (m.asin||'') + '</span>';
  html += '<span class="asintitle">' + e(m.title||'') + '</span>';
  html += '<span class="chg ' + chClass + '" style="margin-left:auto;padding:2px 8px;font-size:12px;font-weight:700">' + chTxt + '</span>';
  html += '</div>';
  html += '<div class="detail-metrics">';
  html += '<div class="dm"><div class="dml">Price</div><div class="dmv pc">' + price + '</div></div>';
  html += '<div class="dm"><div class="dml">BSR</div><div class="dmv bsr">' + bsr + '</div></div>';
  html += '<div class="dm"><div class="dml">Sub BSR</div><div class="dmv" style="font-size:12px">' + bsrSub + '</div></div>';
  html += '<div class="dm"><div class="dml">Rating</div><div class="dmv rt">&#9733; ' + rating + '</div></div>';
  html += '<div class="dm"><div class="dml">Reviews</div><div class="dmv">' + reviews + '</div></div>';
  html += '</div>';
  if (m.bsr_sub_category) {
    html += '<div style="font-size:9px;color:#888;margin-bottom:8px">' + e(m.bsr_sub_category) + '</div>';
  }
  html += '<div class="detail-chart-wrap"><canvas id="c_' + (m.asin||'') + '"></canvas></div>';
  html += '</div>';

  // Other members in group
  g.members.forEach(function(other) {
    if (other === m || !other.asin) return;
    var och = getChange(other);
    var ochClass = och > 0 ? 'up' : och < 0 ? 'dn' : 'flat';
    var ochTxt = och === 0 ? 'stable' : (och > 0 ? '+' + och.toFixed(2) : och.toFixed(2));
    var oprice = other.price ? '$' + other.price.toFixed(2) : '---';
    var obsr = other.bsr ? '#' + other.bsr.toLocaleString() : '---';
    var obsrSub = other.bsr_sub_rank ? '#' + other.bsr_sub_rank.toLocaleString() : '';
    var orating = other.rating || '---';
    var oreiews = other.review_count ? other.review_count.toLocaleString() : '---';
    var oisMain = other.asin === g.main_asin;
    var oimg = other.main_image ? '<img src="' + other.main_image + '" style="width:32px;height:32px;border-radius:4px;object-fit:cover;margin-right:8px;flex-shrink:0">' : '';

    html += '<div class="detail-group' + (oisMain ? ' main-g' : '') + '">';
    html += '<div class="dg-name" style="align-items:center">';
    html += oimg;
    html += '<span class="asinh">' + (oisMain ? '&#9733; ' : '') + (other.asin||'') + '</span>';
    html += '<span class="asintitle">' + e(other.title||'') + '</span>';
    html += '<span class="chg ' + ochClass + '" style="margin-left:auto;padding:2px 8px;font-size:12px;font-weight:700">' + ochTxt + '</span>';
    html += '</div>';
    html += '<div class="detail-metrics">';
    html += '<div class="dm"><div class="dml">Price</div><div class="dmv pc">' + oprice + '</div></div>';
    html += '<div class="dm"><div class="dml">BSR</div><div class="dmv bsr">' + obsr + '</div></div>';
    html += '<div class="dm"><div class="dml">Sub BSR</div><div class="dmv" style="font-size:12px">' + obsrSub + '</div></div>';
    html += '<div class="dm"><div class="dml">Rating</div><div class="dmv rt">&#9733; ' + orating + '</div></div>';
    html += '<div class="dm"><div class="dml">Reviews</div><div class="dmv">' + oreiews + '</div></div>';
    html += '</div>';
    html += '<div class="detail-chart-wrap"><canvas id="co_' + (other.asin||'') + '"></canvas></div>';
    html += '</div>';
  });

  document.getElementById('dtBody').innerHTML = html;
  document.getElementById('detail').classList.add('open');
  setTimeout(function() {
    drawSparkline('c_' + (m.asin||''), m.history||[]);
    g.members.forEach(function(other) {
      if (other !== m && other.asin) drawSparkline('co_' + (other.asin||''), other.history||[]);
    });
  }, 60);
}

function closeDetail() {
  document.getElementById('detail').classList.remove('open');
  Object.keys(_charts).forEach(function(k){ if(_charts[k]){ _charts[k].destroy(); _charts[k]=null; } });
}

function drawSparkline(cid, history) {
  var canvas = document.getElementById(cid);
  if (!canvas) return;
  if (_charts[cid]) { _charts[cid].destroy(); _charts[cid] = null; }
  var prices = [], bsrData = [];
  history.forEach(function(h) {
    if (h.price != null) prices.push(h.price);
    if (h.bsr != null) bsrData.push(h.bsr);
  });
  if (!prices.length && !bsrData.length) return;
  var datasets = [];
  if (prices.length > 1) {
    datasets.push({ label:'Price', data:prices, borderColor:'#B12704', backgroundColor:'rgba(177,39,4,.04)', borderWidth:1.5, fill:true, tension:0.3, pointRadius:0, yAxisID:'y' });
  }
  if (bsrData.length > 1) {
    datasets.push({ label:'BSR', data:bsrData, borderColor:'#067d62', backgroundColor:'transparent', borderWidth:1.5, fill:false, tension:0.3, pointRadius:0, yAxisID:'y1' });
  }
  _charts[cid] = new Chart(canvas, {
    type:'line',
    data:{ labels:history.map(function(){return '';}), datasets:datasets },
    options:{
      responsive:true, maintainAspectRatio:false, animation:false,
      plugins:{ legend:{display:false}, tooltip:{enabled:false} },
      scales:{
        x:{display:false},
        y:{position:'left', grid:{color:'rgba(0,0,0,.05)'}, ticks:{font:{size:9}, maxTicksLimit:3}},
        y1:{position:'right', grid:{display:false}, ticks:{font:{size:9}, maxTicksLimit:3}}
      }
    }
  });
}

function getChange(member) {
  var h = member.history || [];
  if (h.length < 2) return 0;
  var p1 = null, p2 = null;
  for (var i = h.length - 1; i >= 0; i--) {
    if (h[i].price != null && p1 === null) p1 = h[i].price;
    else if (h[i].price != null && p2 === null) { p2 = h[i].price; break; }
  }
  if (p1 == null || p2 == null) return 0;
  return Math.round((p1 - p2) * 100) / 100;
}

function e(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function exportXlsx() {
  if (!_data || !_data.groups) return;
  var wb = XLSX.utils.book_new();
  var rows = [['ASIN','Title','Brand','Price','List Price','Rating','Reviews','BSR','BSR Sub Rank','Category','Seller','Price Change','Last Updated']];
  _data.groups.forEach(function(g) {
    g.members.forEach(function(m) {
      var ch = getChange(m);
      var h = m.history || [];
      var lastTs = '';
      for (var i = h.length - 1; i >= 0; i--) {
        if (h[i].price != null || h[i].bsr != null) { lastTs = h[i].timestamp || ''; break; }
      }
      rows.push([
        m.asin||'', (m.title||'').substring(0,80), m.brand||'',
        m.price||'', m.list_price||'', m.rating||'',
        m.review_count||'', m.bsr||'', m.bsr_sub_rank||'',
        (m.bsr_sub_category||'').substring(0,60), m.seller||'',
        ch, lastTs
      ]);
    });
  });
  var ws = XLSX.utils.aoa_to_sheet(rows);
  ws['!cols'] = [{wch:14},{wch:50},{wch:20},{wch:8},{wch:10},{wch:8},{wch:10},{wch:10},{wch:12},{wch:25},{wch:20},{wch:8},{wch:20}];
  XLSX.utils.book_append_sheet(wb, ws, 'Monitor Data');
  XLSX.writeFile(wb, 'crossmart_monitor_' + new Date().toISOString().substring(0,10) + '.xlsx');
}

initMonitor(window.MONITOR_EMBED || {});

</script>
