<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASIN Monitor</title>
  <style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; }
.dashboard { padding: 20px; max-width: 1400px; margin: 0 auto; }
.topbar { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
.topbar h1 { font-size: 20px; font-weight: 700; color: #f1f5f9; }
.topbar .hint { font-size: 12px; color: #64748b; }
.config-panel { background: #1e293b; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
.config-section { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 12px; }
.config-group { display: flex; flex-direction: column; gap: 4px; }
.config-group label { font-size: 11px; color: #94a3b8; font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }
.config-group input { background: #0f172a; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 8px 10px; font-size: 13px; outline: none; }
.config-group input:focus { border-color: #3b82f6; }
.config-group .row { display: flex; gap: 4px; }
.config-group .row input { flex: 1; }
.config-actions { display: flex; gap: 8px; margin-top: 8px; flex-wrap: wrap; align-items: center; }
.btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; font-weight: 600; transition: all .2s; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-primary:disabled { background: #1e40af; cursor: not-allowed; }
.config-status { font-size: 12px; color: #64748b; margin-top: 4px; }
.filter-bar { display: flex; gap: 10px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
.filter-bar input { flex: 1; min-width: 200px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 8px 12px; font-size: 13px; outline: none; }
.filter-bar input:focus { border-color: #3b82f6; }
.filter-bar select { background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #e2e8f0; padding: 8px 12px; font-size: 13px; outline: none; }
.count-badge { background: #334155; color: #94a3b8; padding: 4px 10px; border-radius: 20px; font-size: 12px; }
.table-wrap { overflow-x: auto; background: #1e293b; border-radius: 10px; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead tr { background: #0f172a; border-bottom: 2px solid #334155; }
th { padding: 10px 8px; text-align: left; font-weight: 700; color: #94a3b8; font-size: 11px; text-transform: uppercase; letter-spacing: .5px; white-space: nowrap; }
tbody tr { border-bottom: 1px solid #1e293b; }
tbody tr:hover { background: #1e293b; }
td { padding: 10px 8px; vertical-align: top; }
.col-asin { font-family: monospace; font-size: 12px; color: #60a5fa; min-width: 110px; }
.col-monitor { font-size: 11px; white-space: nowrap; }
.col-title { min-width: 200px; max-width: 280px; }
.col-title a { color: #e2e8f0; text-decoration: none; }
.col-title a:hover { color: #60a5fa; }
.col-price, .col-reviews, .col-rating, .col-bsr { min-width: 80px; }
.col-diff { min-width: 130px; }
.col-events { min-width: 120px; }
.col-status { min-width: 100px; }
.img-thumb { width: 40px; height: 40px; object-fit: contain; border-radius: 4px; background: #0f172a; }
.events-cell { display: flex; flex-wrap: wrap; gap: 4px; }
.e-tag { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 600; }
.e-alert { background: #7f1d1d; color: #fca5a5; }
.e-warn { background: #78350f; color: #fcd34d; }
.e-info { background: #1e3a5f; color: #93c5fd; }
.e-none { color: #475569; font-size: 12px; }
.status-indicator { padding: 4px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; text-align: center; display: inline-block; min-width: 80px; }
.status-indicator.stable { background: #14532d; color: #86efac; }
.status-indicator.changed { background: #7f1d1d; color: #fca5a5; }
.source-asin { background: #1e40af; color: #bfdbfe; }
.source-kw { background: #065f46; color: #6ee7b7; }
.main-badge { background: #7c3aed; color: #e9d5ff; }
.rel-badge { background: #1e293b; color: #94a3b8; }
.up { color: #86efac; }
.dn { color: #fca5a5; }
.same { color: #94a3b8; }
.diff-none { color: #475569; font-size: 12px; text-align: center; padding: 4px; }
.diff-item { font-size: 12px; padding: 2px 0; }
.diff-arrow { font-size: 10px; margin-right: 4px; }
.diff-tip { font-size: 12px; color: #94a3b8; margin-top: 4px; }
.tip-box { background: #0f172a; border-radius: 6px; padding: 8px; margin-top: 4px; text-align: left; }
.tip-row { display: flex; gap: 8px; padding: 2px 0; font-size: 12px; }
.tip-label { color: #64748b; min-width: 80px; }
.tip-val { color: #e2e8f0; }
.tip-val.up { color: #86efac; }
.tip-val.dn { color: #fca5a5; }
.cat-item { color: #64748b; font-size: 12px; }
.grid-cell input { background: #0f172a; border: 1px solid #334155; border-radius: 4px; color: #e2e8f0; padding: 6px 8px; font-size: 12px; width: 100%; outline: none; }
.grid-cell input:focus { border-color: #3b82f6; }
.older { color: #475569; font-size: 10px; }
.polling-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #3b82f6; margin-left: 8px; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

  </style>
</head>
<body>
<div class="dashboard">
  <div class="topbar">
    <h1>ASIN Monitor</h1>
    <span class="hint">| Data via GitHub API |</span>
    <span id="pollingDot" class="polling-dot" style="display:none"></span>
  </div>
  <div class="config-panel">
    <div class="config-section">
      <div class="config-group">
        <label>ASIN 流 1 (Stream 1)</label>
        <div class="row">
          <input type="text" id="in-asin-0" placeholder="B0...">
          <input type="text" id="in-kw-0" placeholder="关键词">
        </div>
        <div class="grid-cell">
          <div style="font-size:10px;color:#64748b;margin:4px 0 2px">关联 ASIN (1-5)</div>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
            <input type="text" id="rel-0-0-0" placeholder="ASIN1">
            <input type="text" id="rel-0-0-1" placeholder="ASIN2">
            <input type="text" id="rel-0-0-2" placeholder="ASIN3">
            <input type="text" id="rel-0-0-3" placeholder="ASIN4">
            <input type="text" id="rel-0-0-4" placeholder="ASIN5">
          </div>
        </div>
      </div>
      <div class="config-group">
        <label>ASIN 流 2 (Stream 2)</label>
        <div class="row">
          <input type="text" id="in-asin-1" placeholder="B0...">
          <input type="text" id="in-kw-1" placeholder="关键词">
        </div>
        <div class="grid-cell">
          <div style="font-size:10px;color:#64748b;margin:4px 0 2px">关联 ASIN (1-5)</div>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
            <input type="text" id="rel-1-0-0" placeholder="ASIN1">
            <input type="text" id="rel-1-0-1" placeholder="ASIN2">
            <input type="text" id="rel-1-0-2" placeholder="ASIN3">
            <input type="text" id="rel-1-0-3" placeholder="ASIN4">
            <input type="text" id="rel-1-0-4" placeholder="ASIN5">
          </div>
        </div>
      </div>
      <div class="config-group">
        <label>ASIN 流 3 (Stream 3)</label>
        <div class="row">
          <input type="text" id="in-asin-2" placeholder="B0...">
          <input type="text" id="in-kw-2" placeholder="关键词">
        </div>
        <div class="grid-cell">
          <div style="font-size:10px;color:#64748b;margin:4px 0 2px">关联 ASIN (1-5)</div>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
            <input type="text" id="rel-2-0-0" placeholder="ASIN1">
            <input type="text" id="rel-2-0-1" placeholder="ASIN2">
            <input type="text" id="rel-2-0-2" placeholder="ASIN3">
            <input type="text" id="rel-2-0-3" placeholder="ASIN4">
            <input type="text" id="rel-2-0-4" placeholder="ASIN5">
          </div>
        </div>
      </div>
      <div class="config-group">
        <label>ASIN 流 4 (Stream 4)</label>
        <div class="row">
          <input type="text" id="in-asin-3" placeholder="B0...">
          <input type="text" id="in-kw-3" placeholder="关键词">
        </div>
        <div class="grid-cell">
          <div style="font-size:10px;color:#64748b;margin:4px 0 2px">关联 ASIN (1-5)</div>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
            <input type="text" id="rel-3-0-0" placeholder="ASIN1">
            <input type="text" id="rel-3-0-1" placeholder="ASIN2">
            <input type="text" id="rel-3-0-2" placeholder="ASIN3">
            <input type="text" id="rel-3-0-3" placeholder="ASIN4">
            <input type="text" id="rel-3-0-4" placeholder="ASIN5">
          </div>
        </div>
      </div>
      <div class="config-group">
        <label>ASIN 流 5 (Stream 5)</label>
        <div class="row">
          <input type="text" id="in-asin-4" placeholder="B0...">
          <input type="text" id="in-kw-4" placeholder="关键词">
        </div>
        <div class="grid-cell">
          <div style="font-size:10px;color:#64748b;margin:4px 0 2px">关联 ASIN (1-5)</div>
          <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:4px">
            <input type="text" id="rel-4-0-0" placeholder="ASIN1">
            <input type="text" id="rel-4-0-1" placeholder="ASIN2">
            <input type="text" id="rel-4-0-2" placeholder="ASIN3">
            <input type="text" id="rel-4-0-3" placeholder="ASIN4">
            <input type="text" id="rel-4-0-4" placeholder="ASIN5">
          </div>
        </div>
      </div>
    </div>
    <div class="config-actions">
      <button class="btn btn-primary" id="btnSave" onclick="saveConfig()">保存配置</button>
      <button class="btn btn-primary" id="btnTrigger" onclick="triggerMonitor()">保存配置并触发抓取</button>
      <input type="text" id="ghTokenInput" placeholder="GitHub Token (可选)" style="flex:1;max-width:300px">
      <span id="configStatus" class="config-status">正在加载...</span>
    </div>
  </div>
  <div class="filter-bar">
    <input type="text" id="searchInput" placeholder="搜索 ASIN / 关键词 / 标题..." oninput="renderTable()">
    <select id="filterType" onchange="renderTable()">
      <option value="">全部类型</option>
      <option value="ASIN">ASIN</option>
      <option value="Keyword">关键词</option>
    </select>
    <select id="filterStatus" onchange="renderTable()">
      <option value="">全部状态</option>
      <option value="异常">异常</option>
      <option value="正常">正常</option>
    </select>
    <span id="rowCount" class="count-badge">0 条</span>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th class="col-asin">ASIN</th>
          <th class="col-monitor">类型</th>
          <th class="col-title">标题 / 监控关键词</th>
          <th class="col-price">价格</th>
          <th class="col-reviews">评价数</th>
          <th class="col-rating">评分</th>
          <th class="col-bsr">BSR</th>
          <th class="col-diff">变化（较上次）</th>
          <th class="col-events">事件</th>
          <th class="col-status">状态</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <tr><td colspan="10" style="text-align:center;color:#475569;padding:40px">正在加载...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<script>
const REPO = 'charlescome1995-prog/crossmart-monitor';
const RAW_DATA_URL = 'https://api.github.com/repos/' + REPO + '/contents/frontend/data/rawData.json?ref=main';
const CONFIG_URL = 'https://api.github.com/repos/' + REPO + '/contents/backend/data/user_config.json?ref=main';
const KW_REL_URL = 'https://api.github.com/repos/' + REPO + '/contents/backend/data/keyword_related_asins.json?ref=main';

let rawData = { items: [], keywords: [] };
let kwRelData = {};
let pollTimer = null;

function btoaEncode(s) {
  return btoa(encodeURIComponent(s).replace(/%([0-9A-F]{2})/g, function(_, p) {
    return String.fromCharCode(parseInt(p, 16));
  }));
}

function getRelatedVals(type, streamIdx) {
  var vals = [];
  for (var r = 0; r < 5; r++) {
    var el = document.getElementById('rel-' + type + '-' + streamIdx + '-' + r);
    if (el && el.value.trim()) vals.push(el.value.trim());
  }
  return vals;
}

async function putFile(path, content) {
  var resp = await fetch('https://raw.githubusercontent.com/' + REPO + '/main/' + path + '?v=' + Date.now());
  var sha = resp.ok ? (await resp.json()).sha : null;
  var token = document.getElementById('ghTokenInput').value.trim();
  var base = btoaEncode(JSON.stringify(content));
  var body = JSON.stringify({ message: 'Update ' + path, content: base, sha: sha });
  var r = await fetch('https://api.github.com/repos/' + REPO + '/contents/' + path, {
    method: 'PUT',
    headers: { 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json', 'Authorization': 'token ' + (token || 'invalid') },
    body: body
  });
  if (!r.ok) throw new Error('HTTP ' + r.status);
}

window.addEventListener('DOMContentLoaded', function() {
  var tokenInput = document.getElementById('ghTokenInput');
  if (tokenInput) {
    var saved = sessionStorage.getItem('gh_token') || '';
    if (saved) tokenInput.value = saved;
    tokenInput.addEventListener('input', function() {
      sessionStorage.setItem('gh_token', tokenInput.value.trim());
    });
  }
  loadGitHubConfig();
  loadRawData();
});

async function loadGitHubConfig() {
  var statusEl = document.getElementById('configStatus');
  try {
    var resp = await fetch(CONFIG_URL + '&t=' + Date.now(), { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var meta = await resp.json();
    var cfg = JSON.parse(atob(meta.content));
    var kwResp = await fetch(KW_REL_URL + '&t=' + Date.now(), { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    var kwMeta = kwResp.ok ? await kwResp.json() : null;
    var kwData = kwMeta ? JSON.parse(atob(kwMeta.content)) : {};
    applyConfig(cfg, kwData);
    statusEl.textContent = '配置已加载';
  } catch(e) {
    statusEl.textContent = '加载配置失败，请检查网络';
    console.error('loadGitHubConfig failed:', e);
  }
}

function applyConfig(cfg, kwRelData) {
  if (!cfg) return;
  for (var i = 0; i < 5; i++) {
    var a = cfg['asin_' + i] || '';
    var k = cfg['kw_' + i] || '';
    var aEl = document.getElementById('in-asin-' + i);
    var kEl = document.getElementById('in-kw-' + i);
    if (aEl) aEl.value = a;
    if (kEl) kEl.value = k;
    var rels = cfg['related_asins_' + i] || [];
    for (var r = 0; r < 5; r++) {
      var relEl = document.getElementById('rel-' + i + '-0-' + r);
      if (relEl) relEl.value = rels[r] || '';
    }
  }
  if (kwRelData) window.kwRelData = kwRelData;
}

async function loadRawData() {
  try {
    var resp = await fetch(RAW_DATA_URL + '&t=' + Date.now(), { headers: { 'Accept': 'application/vnd.github.v3+json' } });
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var meta = await resp.json();
    var data = JSON.parse(atob(meta.content));
    rawData = data;
    renderTable();
  } catch(e) {
    console.warn('loadRawData failed:', e.message);
    renderTable();
  }
}

async function saveConfig() {
  var btn = document.getElementById('btnSave');
  btn.textContent = '保存中...';
  btn.disabled = true;
  try {
    var cfg = {};
    for (var i = 0; i < 5; i++) {
      cfg['asin_' + i] = (document.getElementById('in-asin-' + i).value || '').trim();
      cfg['kw_' + i] = (document.getElementById('in-kw-' + i).value || '').trim();
      cfg['related_asins_' + i] = getRelatedVals(i, 0);
    }
    await putFile('backend/data/user_config.json', cfg);
    await putFile('backend/data/trigger.json', { triggered_at: Date.now(), status: 'pending' });
    btn.textContent = '保存成功';
    setTimeout(function() { btn.textContent = '保存配置'; btn.disabled = false; }, 3000);
  } catch(e) {
    btn.textContent = '保存失败';
    console.error(e);
    setTimeout(function() { btn.textContent = '保存配置'; btn.disabled = false; }, 5000);
  }
}

async function triggerMonitor() {
  var btn = document.getElementById('btnTrigger');
  var statusEl = document.getElementById('configStatus');
  btn.disabled = true;
  btn.textContent = '触发中...';
  statusEl.textContent = '';
  try {
    var cfg = {};
    for (var i = 0; i < 5; i++) {
      cfg['asin_' + i] = (document.getElementById('in-asin-' + i).value || '').trim();
      cfg['kw_' + i] = (document.getElementById('in-kw-' + i).value || '').trim();
      cfg['related_asins_' + i] = getRelatedVals(i, 0);
    }
    await putFile('backend/data/user_config.json', cfg);
    await putFile('backend/data/trigger.json', { triggered_at: Date.now(), status: 'pending' });
    btn.textContent = '触发成功';
    startPolling();
    setTimeout(function() { btn.textContent = '保存配置并触发抓取'; btn.disabled = false; }, 5000);
  } catch(e) {
    btn.textContent = '触发失败';
    statusEl.textContent = '错误: ' + e.message;
    console.error(e);
    setTimeout(function() { btn.textContent = '保存配置并触发抓取'; btn.disabled = false; }, 5000);
  }
}

function startPolling() {
  document.getElementById('pollingDot').style.display = 'inline-block';
  pollTimer = setInterval(loadRawData, 5000);
}

function stopPolling() {
  clearInterval(pollTimer);
  pollTimer = null;
  document.getElementById('pollingDot').style.display = 'none';
}

function drawSparkline(data, color) {
  if (!data || data.length < 2) return '<span class="older">无历史数据</span>';
  var w = 60, h = 20;
  var min = Math.min.apply(null, data);
  var max = Math.max.apply(null, data);
  var range = max - min || 1;
  var pts = data.map(function(v, i) {
    return (i / (data.length - 1) * w).toFixed(1) + ',' + (h - (v - min) / range * h).toFixed(1);
  }).join(' ');
  return '<svg width="' + w + '" height="' + h + '" style="vertical-align:middle"><polyline points="' + pts + '" fill="none" stroke="' + color + '" stroke-width="1.5"/></svg>';
}

function buildDiff(prev, curr) {
  var diff = {};
  if (!prev || !curr) return null;
  var numFields = ['price', 'review_count', 'rating', 'bsr'];
  numFields.forEach(function(f) {
    if (curr[f] !== undefined && prev[f] !== undefined && curr[f] !== prev[f]) {
      diff[f] = { prev: prev[f], current: curr[f], change: curr[f] - prev[f], direction: curr[f] > prev[f] ? 'up' : 'dn' };
      if (f === 'price') diff[f].pct = (((curr[f] - prev[f]) / prev[f]) * 100).toFixed(1) + '%';
    }
  });
  var pb = prev.badges_current || [], cb = curr.badges_current || [];
  var gained = cb.filter(function(x) { return pb.indexOf(x) === -1; });
  var lost = pb.filter(function(x) { return cb.indexOf(x) === -1; });
  if (gained.length || lost.length) diff.badges = { gained: gained, lost: lost };
  ['deal_activity', 'variant_status'].forEach(function(f) {
    if (curr[f] && prev[f] !== curr[f]) diff[f] = { prev: prev[f] || '', current: curr[f] || '', direction: 'changed' };
  });
  ['title_changed', 'img_changed', 'bullets_changed', 'description_changed'].forEach(function(f) {
    if (curr[f]) { if (!diff.badges) diff.badges = {}; diff.badges[f] = true; }
  });
  return Object.keys(diff).length ? diff : null;
}

function renderTable() {
  var search = document.getElementById('searchInput').value.trim().toLowerCase();
  var typeFilter = document.getElementById('filterType').value;
  var items = rawData.items || [];
  var filtered = items.filter(function(item) {
    if (search) {
      var s = (item.asin + ' ' + (item.main_kw || '') + ' ' + (item.title || '') + ' ' + (item.main_cat || '')).toLowerCase();
      if (s.indexOf(search) === -1) return false;
    }
    if (typeFilter && item.monitor_type !== typeFilter) return false;
    return true;
  });
  document.getElementById('rowCount').textContent = filtered.length + ' 条';
  var tbody = document.getElementById('tableBody');
  if (filtered.length === 0) {
    tbody.innerHTML = '<tr><td colspan="10" style="text-align:center;color:#475569;padding:40px">无数据</td></tr>';
    return;
  }
  var html = '';
  filtered.forEach(function(item) {
    var prev = item.history && item.history.length >= 2 ? item.history[item.history.length - 2] : null;
    var diff = prev ? buildDiff(prev, item) : null;
    var isStatusAnomaly = item.is_status_anomaly;
    var isInfoAnomaly = item.is_info_anomaly;
    var isCatAnomaly = item.is_cat_anomaly;
    var activeEvents = [];
    if (isStatusAnomaly) activeEvents.push({ class: 'e-alert', text: item.listing_status || '状态异常' });
    if (isInfoAnomaly) activeEvents.push({ class: 'e-alert', text: '商品信息异常' });
    if (isCatAnomaly) activeEvents.push({ class: 'e-alert', text: '类目排名异常' });
    if (item.title_changed) activeEvents.push({ class: 'e-warn', text: '标题变化' });
    if (item.img_changed) activeEvents.push({ class: 'e-warn', text: '图片变化' });
    if (item.bullets_changed) activeEvents.push({ class: 'e-warn', text: '五点变化' });
    if (item.description_changed) activeEvents.push({ class: 'e-warn', text: '描述变化' });
    if (item.coupon) activeEvents.push({ class: 'e-info', text: '优惠券: ' + item.coupon });
    if (item.prime_discount) activeEvents.push({ class: 'e-info', text: 'Prime折扣: ' + item.prime_discount });
    if (item.deal_activity) activeEvents.push({ class: 'e-info', text: '促销: ' + item.deal_activity });
    var chgText = item.chg !== 0 ? (item.chg > 0 ? '+' : '') + item.chg : '';
    var hasActiveAnomaly = isStatusAnomaly || isInfoAnomaly || isCatAnomaly;
    var diffHtml = '<div class="diff-none">无变化</div>';
    if (diff) {
      var diffLines = [];
      ['price', 'review_count', 'rating', 'bsr'].forEach(function(f) {
        if (!diff[f]) return;
        var dir = diff[f].direction;
        var arrow = dir === 'up' ? '&#9650;' : '&#9660;';
        var label = { price: '价格', review_count: '评价数', rating: '评分', bsr: 'BSR' }[f];
        var val = f === 'price' ? '$' + diff[f].current : diff[f].current;
        diffLines.push('<div class="diff-item"><span class="diff-arrow ' + dir + '">' + arrow + '</span> ' + label + ': <span class="' + dir + '">' + val + '</span></div>');
      });
      if (diff.badges) {
        if (diff.badges.gained && diff.badges.gained.length) diffLines.push('<div class="diff-item e-alert">+' + diff.badges.gained.join(', ') + '</div>');
        if (diff.badges.lost && diff.badges.lost.length) diffLines.push('<div class="diff-item e-warn">-' + diff.badges.lost.join(', ') + '</div>');
      }
      if (diff.deal_activity) diffLines.push('<div class="diff-item">Deal: ' + diff.deal_activity.current + '</div>');
      if (diffLines.length > 0) diffHtml = diffLines.slice(0, 3).join('') + '<div class="diff-tip">较上次: ' + chgText + '</div>';
    }
    var eventsHtml = activeEvents.length ? activeEvents.map(function(e) {
      return '<span class="e-tag ' + e.class + '">' + e.text + '</span>';
    }).join('') : '<span class="e-none">无</span>';
    var statusClass = hasActiveAnomaly ? 'changed' : 'stable';
    var statusText = hasActiveAnomaly ? '异常' : '正常';
    var typeBadge = '<span class="source-' + (item.monitor_type === 'ASIN' ? 'asin' : 'kw') + '">' + item.monitor_type + '</span>';
    var logicBadge = item.is_main ? '<span class="main-badge">主</span>' : '<span class="rel-badge">关联</span>';
    var img = item.main_image ? '<img class="img-thumb" src="' + item.main_image + '" alt="img" onerror="this.style.display='none'">' : '';
    var titleLink = item.asin_url ? '<a href="' + item.asin_url + '" target="_blank">' + (item.title || item.main_kw || item.asin) + '</a>' : (item.title || item.main_kw || item.asin);
    html += '<tr>' +
      '<td class="col-asin">' + item.asin + '</td>' +
      '<td class="col-monitor">' + typeBadge + ' ' + logicBadge + '</td>' +
      '<td class="col-title">' + img + ' ' + titleLink + '</td>' +
      '<td class="col-price">$' + (item.price || '-') + '</td>' +
      '<td class="col-reviews">' + (item.reviews || 0) + '</td>' +
      '<td class="col-rating">' + (item.rating || '-') + '</td>' +
      '<td class="col-bsr">' + (item.main_bsr ? '#' + item.main_bsr : '-') + '</td>' +
      '<td class="col-diff">' + diffHtml + '</td>' +
      '<td class="col-events"><div class="events-cell">' + eventsHtml + '</div></td>' +
      '<td><span class="status-indicator ' + statusClass + '">' + statusText + '</span></td>' +
      '</tr>';
  });
  tbody.innerHTML = html;
}
</script>

</body>
</html>
