<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eaeded;color:#0f1111;font-size:14px;min-height:100vh}

/* ─── Top Bar ─── */
.topbar{background:#131921;color:#fff;display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 24px;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:16px}
.topbar nav{display:flex;gap:14px;font-size:13px}
.topbar nav a{color:rgba(255,255,255,.75);text-decoration:none;padding:4px 0;border-bottom:2px solid transparent;transition:.15s}
.topbar nav a:hover,.topbar nav a.active{color:#fff;border-bottom-color:#e94560}

/* ─── Filter Bar ─── */
.filters{background:#fff;padding:10px 20px;display:flex;gap:10px;align-items:center;border-bottom:1px solid #d5d9d9;position:sticky;top:48px;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.04);flex-wrap:wrap}
.filters select,.filters input{padding:6px 10px;border:1px solid #d5d9d9;border-radius:6px;font-size:13px;background:#fff;outline:none}
.filters input{width:160px}
.filters label{font-size:12px;color:#555;display:flex;align-items:center;gap:4px;cursor:pointer}
.btn{display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;background:#e6e8ea;color:#0f1111}
.btn:hover{background:#d5d9d9}
.btn-sm{padding:3px 10px;font-size:11px}
.btn-p{background:#ffd814;color:#0f1111}.btn-p:hover{background:#f7ca00}

/* ─── Group Grid (5 columns) ─── */
.board-wrap{padding:12px 8px;overflow-x:auto}
.board{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;min-width:900px}
.board.cols-3{grid-template-columns:repeat(3,1fr)}
.board.cols-4{grid-template-columns:repeat(4,1fr)}

.col-card{background:#fff;border:1px solid #d5d9d9;border-radius:10px;overflow:hidden;box-shadow:0 1px 4px rgba(0,0,0,.06);display:flex;flex-direction:column}
.col-hdr{padding:10px 12px 8px;border-bottom:2px solid #e94560;background:#fafafa}
.col-hdr .main-asin{font-size:12px;font-weight:700;color:#007185;margin-bottom:2px}
.col-hdr .main-title{font-size:11px;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;display:block}
.col-hdr .meta-row{display:flex;gap:6px;margin-top:4px;flex-wrap:wrap}
.col-hdr .tag{padding:1px 6px;border-radius:4px;font-size:10px;background:#f0f8ff;color:#067d62;border:1px solid #ceead6}
.col-hdr .tag.price{background:#fff8e6;color:#9e7800;border-color:#fceeb5}
.col-hdr .tag.bsr{background:#fef2f2;color:#991b1b;border-color:#fecaca}
.col-hdr .tag.main-flag{background:#e94560;color:#fff;border-color:#e94560;font-weight:700}

.member-row{padding:6px 8px;border-bottom:1px solid #f0f2f2;display:flex;align-items:center;gap:6px;cursor:pointer;transition:.12s;min-height:54px}
.member-row:last-child{border-bottom:none}
.member-row:hover{background:#f7fafc}
.member-row.main-row{background:#fffbe6;border-left:3px solid #e94560}
.member-row.changed-row{background:#fef9e6;border-left:3px solid #f0ad4e}

.m-img{width:40px;height:40px;flex-shrink:0;border-radius:4px;overflow:hidden;background:#f5f5f5;display:flex;align-items:center;justify-content:center}
.m-img img{width:40px;height:40px;object-fit:cover}
.m-img .ph{font-size:18px;color:#ccc}

.m-info{flex:1;min-width:0}
.m-name{font-size:11px;font-weight:600;color:#0f1111;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.m-asin{font-size:10px;color:#999;font-family:monospace;margin:1px 0}
.m-price{font-size:12px;font-weight:700;color:#B12704}

.m-chg{font-size:10px;font-weight:600;text-align:right;min-width:50px;flex-shrink:0}
.m-chg.up{color:#059669}.m-chg.down{color:#dc2626}.m-chg.flat{color:#999}

/* Detail slide-down */
.member-detail{display:none;padding:8px;border-top:1px solid #eee;background:#fafafa}
.member-detail.open{display:block}
.detail-chart{padding:4px 0;min-height:160px}
.detail-chart canvas{width:100%!important;max-height:200px}
.detail-meta{font-size:11px;color:#888;padding:2px 0}
.detail-meta span{margin-right:12px}

/* Loading/empty */
.loading{text-align:center;padding:40px;color:#999;font-size:13px}
.err{text-align:center;padding:40px;color:#B12704;font-size:13px}

/* Responsive */
@media(max-width:1100px){
  .board{grid-template-columns:repeat(3,1fr)}
}
@media(max-width:768px){
  .board{grid-template-columns:repeat(2,1fr)}
  .topbar{padding:0 12px}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">Cross<span style="color:#e94560">Mart</span></span>
  <nav>
    <a href="../index.html">Home</a>
    <a href="monitor.html" class="active">Monitor</a>
    <a href="selection.html">Selection</a>
  </nav>
</div>

<div class="filters">
  <input type="text" id="searchIn" placeholder="&#x1F50D; Search..." oninput="render()">
  <select id="sortBy" onchange="render()">
    <option value="bsr">BSR &#x2B06;</option>
    <option value="price_chg">Price Change</option>
    <option value="bsr_chg">BSR Change</option>
    <option value="price">Price &#x2B07;</option>
  </select>
  <label><input type="checkbox" id="onlyChg" onchange="render()"> Changes only</label>
  <button class="btn btn-sm" onclick="refresh()">&#x1F504; Refresh</button>
  <button class="btn btn-sm btn-p" onclick="exportCsv()">&#x1F4E5; Export</button>
</div>

<div id="summary" style="padding:8px 16px;background:#fff;border-bottom:1px solid #eee;font-size:12px;color:#555;display:none"></div>

<div id="board" class="board-wrap">
  <div class="loading">&#x231B; Loading ASIN groups...</div>
</div>

<script>
// ─── State ───
var gData = null;
var gCharts = {};
var API = 'data/monitor-data.json';

// ─── Init ───
async function loadData(){
  try{
    var r = await fetch(API+'?'+Date.now());
    if(!r.ok) throw new Error('HTTP '+r.status);
    gData = await r.json();
    render();
    document.getElementById('summary').style.display = 'flex';
    document.getElementById('summary').innerHTML =
      '\u{1F4E6} <b>'+(gData.total_asins||0)+'</b> ASINs &middot; '+
      '<b>'+(gData.groups||[]).length+'</b> groups &middot; '+
      'Updated: '+(gData.updated||'').substring(0,16);
  }catch(e){
    document.getElementById('board').innerHTML = '<div class="err">&#x274C; '+e.message+'</div>';
  }
}

function refresh(){
  gCharts = {};
  document.getElementById('board').innerHTML = '<div class="loading">&#x231B; Loading...</div>';
  loadData();
}

// ─── Helpers ───
function fmt(n){
  if(n===null||n===undefined||n==='') return '-';
  return typeof n==='number'?n.toLocaleString():n;
}
function fmtPrice(v){
  if(v===null||v===undefined||v==='') return '-';
  return '$'+parseFloat(v).toFixed(2);
}

// ─── Render ───
function render(){
  var groups = gData && gData.groups;
  if(!groups){document.getElementById('board').innerHTML='<div class="err">No data</div>';return;}

  var kw = (document.getElementById('searchIn').value||'').toLowerCase().trim();
  var by = document.getElementById('sortBy').value;
  var oc = document.getElementById('onlyChg').checked;

  var board = document.getElementById('board');
  var activeCols = groups.filter(function(g){
    if(!kw) return true;
    return g.members.some(function(m){
      return ((m.title||'').toLowerCase().includes(kw))||((m.asin||'').toLowerCase().includes(kw))||((m.brand||'').toLowerCase().includes(kw));
    });
  });

  var colClass = 'board cols-'+activeCols.length;
  var html = '';

  for(var gi=0;gi<activeCols.length;gi++){
    var g = activeCols[gi];
    var members = g.members.filter(function(m){return m.asin;});

    // Filter by keyword
    if(kw){
      members = members.filter(function(m){
        return ((m.title||'').toLowerCase().includes(kw))||((m.asin||'').toLowerCase().includes(kw))||((m.brand||'').toLowerCase().includes(kw));
      });
    }

    // Sort
    var sm = {
      bsr: function(a,b){return (a.bsr||999999)-(b.bsr||999999);},
      price_chg: function(a,b){return Math.abs(b.price_change_pct||0)-Math.abs(a.price_change_pct||0);},
      bsr_chg: function(a,b){return (a.bsr_change||0)-(b.bsr_change||0);},
      price: function(a,b){return (b.price||0)-(a.price||0);}
    };
    if(sm[by]) members.sort(sm[by]);

    if(oc){
      members = members.filter(function(m){return m.has_diff;});
    }

    if(!members.length) continue;

    var main = members[0];
    var mainTitle = (main.title||'').substring(0,40)+(main.title&&main.title.length>40?'...':'');
    var mainPrice = main.price?fmtPrice(main.price):'-';
    var mainBsr = main.bsr?'#'+fmt(main.bsr):'-';
    var priceChgPct = main.price_change_pct;
    var bsrChg = main.bsr_change;
    var hasDiff = main.has_diff;
    var changedCls = hasDiff?'c':'s';

    html += '<div class="col-card">';
    html += '<div class="col-hdr">';
    html += '<div class="main-asin">'+main.asin+'</div>';
    html += '<div class="main-title" title="'+main.title+'">'+mainTitle+'</div>';
    html += '<div class="meta-row">';
    html += '<span class="tag main-flag">&#x2605; MAIN</span>';
    html += '<span class="tag price">'+mainPrice+'</span>';
    html += '<span class="tag bsr">BSR '+mainBsr+'</span>';
    if(priceChgPct&&Math.abs(priceChgPct)>0.01){
      var pcls = priceChgPct>0?'up':'down';
      var parr = priceChgPct>0?'\u{1F7E1}':'\u{1F534}';
      html += '<span class="tag '+pcls+'" style="background:'+(priceChgPct>0?'#f0fdf4':'#fef2f2')+';color:'+(priceChgPct>0?'#166534':'#991b1b')+'">'+parr+' '+Math.abs(priceChgPct).toFixed(1)+'%</span>';
    }
    if(bsrChg&&bsrChg!==0){
      var bcls = bsrChg<0?'up':'down';
      var barr = bsrChg<0?'\u{2191}':'\u{2193}';
      html += '<span class="tag '+bcls+'" style="background:'+(bsrChg<0?'#f0fdf4':'#fef2f2')+';color:'+(bsrChg<0?'#166534':'#991b1b')+'">'+barr+' '+Math.abs(bsrChg)+'</span>';
    }
    html += '</div></div>';

    for(var mi=0;mi<members.length;mi++){
      var m = members[mi];
      var isMainRow = m.is_main;
      var rowCls = isMainRow?'main-row':(m.has_diff?'changed-row':'');
      var imgUrl = m.main_image||'';
      var pcp = m.price_change_pct||0;
      var bc = m.bsr_change||0;
      var chgStr = '';
      if(m.has_history){
        if(Math.abs(pcp)>=0.01){
          var pcls2 = pcp>0?'up':(pcp<0?'down':'flat');
          var parr2 = pcp>0?'\u{1F7E1}':(pcp<0?'\u{1F534}':'\u{1F7E2}');
          chgStr += '<span class="m-chg '+pcls2+'">'+parr2+' '+Math.abs(pcp).toFixed(1)+'%</span>';
        }
        if(bc!==0){
          var bcls2 = bc<0?'up':(bc>0?'down':'flat');
          var barr2 = bc<0?'\u{2191}':(bc>0?'\u{2193}':'\u{2192}');
          chgStr += '<span class="m-chg '+bcls2+'">'+barr2+' '+Math.abs(bc)+'</span>';
        }
      }
      if(!chgStr) chgStr = '<span class="m-chg flat">&#x2014;</span>';

      var memberId = 'm-'+gi+'-'+mi;

      html += '<div class="member-row '+rowCls+'" onclick="toggleDetail(\''+memberId+'\','+gi+','+mi+')">';
      html += '<div class="m-img">';
      if(imgUrl){
        html += '<img src="'+imgUrl+'" alt="" onerror="this.style.display=\'none\';this.nextSibling.style.display=\'flex\'"><div class="ph" style="display:none">\u{1F4F7}</div>';
      } else {
        html += '<div class="ph">\u{1F4F7}</div>';
      }
      html += '</div>';
      html += '<div class="m-info">';
      html += '<div class="m-name" title="'+m.title+'">'+((m.title||'').substring(0,30))+'</div>';
      html += '<div class="m-asin">'+m.asin+(isMainRow?' &#x2605;':'')+'</div>';
      html += '<div class="m-price">'+(m.price?fmtPrice(m.price):'-')+'</div>';
      html += '</div>';
      html += chgStr;
      html += '</div>';
      html += '<div class="member-detail" id="det-'+memberId+'">';
      html += '<div class="detail-chart"><canvas id="cv-'+memberId.replace(/-/g,'_')+'"></canvas></div>';
      html += '<div class="detail-meta">';
      if(m.brand) html += '<span>&#x1F3FA; '+m.brand+'</span>';
      if(m.rating) html += '<span>&#x2B50; '+m.rating+'</span>';
      if(m.review_count) html += '<span>&#x1F4AC; '+fmt(m.review_count)+'</span>';
      if(m.seller) html += '<span>&#x1F4E8; '+m.seller.substring(0,20)+'</span>';
      html += '</div></div>';
    }

    html += '</div>';
  }

  if(!html){
    board.innerHTML = '<div class="err" style="padding:40px">No matching ASINs found</div>';
    return;
  }

  board.innerHTML = html;
  board.className = 'board-wrap';

  // Draw charts for visible groups
  for(var gi=0;gi<activeCols.length;gi++){
    var g = activeCols[gi];
    for(var mi=0;mi<g.members.length;mi++){
      var m = g.members[mi];
      if(m.history&&m.history.length>=2){
        drawChart('m-'+gi+'-'+mi, m);
      }
    }
  }
}

function toggleDetail(memberId, gi, mi){
  var el = document.getElementById('det-'+memberId);
  if(!el) return;
  var isOpen = el.classList.contains('open');
  // Close all
  document.querySelectorAll('.member-detail').forEach(function(e){e.classList.remove('open');});
  if(!isOpen){
    el.classList.add('open');
    var g = gData.groups[gi];
    var m = g.members[mi];
    if(m.history&&m.history.length>=2){
      drawChart(memberId, m);
    }
  }
}

function drawChart(memberId, m){
  var cid = 'cv-'+memberId.replace(/-/g,'_');
  var cv = document.getElementById(cid);
  if(!cv) return;
  var c1 = 'ch_'+memberId;
  if(gCharts[c1]){gCharts[c1].destroy();delete gCharts[c1];}
  var h = m.history;
  var labels = h.map(function(x){return x.timestamp&&x.timestamp.length>=16?x.timestamp.substring(5,16):'';});
  gCharts[c1] = new Chart(cv.getContext('2d'),{
    type:'line',
    data:{
      labels:labels,
      datasets:[
        {label:'Price ($)',data:h.map(function(x){return x.price;}),borderColor:'#007185',backgroundColor:'rgba(0,113,133,0.08)',fill:true,tension:0.3,pointRadius:2,yAxisID:'y'},
        {label:'BSR',data:h.map(function(x){return x.bsr;}),borderColor:'#dc2626',backgroundColor:'rgba(220,38,38,0.06)',fill:true,tension:0.3,pointRadius:2,yAxisID:'y1'}
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{legend:{position:'top',labels:{usePointStyle:true,padding:12,font:{size:10}}},tooltip:{callbacks:{label:function(ctx){
        return ctx.dataset.label.includes('Price')?'Price: $'+ctx.parsed.y.toFixed(2):'BSR: #'+Math.round(ctx.parsed.y).toLocaleString();
      }}}},
      scales:{
        x:{grid:{display:false},ticks:{maxRotation:45,font:{size:9}}},
        y:{type:'linear',display:true,position:'left',title:{display:true,text:'Price ($)',font:{size:10}},grid:{color:'rgba(0,0,0,0.04)'}},
        y1:{type:'linear',display:true,position:'right',reverse:true,title:{display:true,text:'BSR',font:{size:10}},grid:{drawOnChartArea:false}}
      }
    }
  });
}

// ─── CSV Export ───
function exportCsv(){
  if(!gData||!gData.groups) return;
  var csv = '\uFEFFGroup,Is Main,ASIN,Title,Brand,Price,List Price,Rating,Reviews,BSR,Seller,Price Change,Price Change %,BSR Change,Has History,Snapshot Count,Last Check\n';
  gData.groups.forEach(function(g){
    g.members.forEach(function(m){
      if(!m.asin) return;
      var h = m.history||[];
      var lastTs = h.length?(h[h.length-1].timestamp||'').substring(0,16):'';
      csv += [
        g.main_asin,
        m.is_main?'Yes':'No',
        m.asin,
        (m.title||'').replace(/"/g,'""'),
        (m.brand||'').replace(/"/g,'""'),
        m.price!=null?'$'+m.price.toFixed(2):'',
        m.list_price!=null?'$'+m.list_price.toFixed(2):'',
        m.rating!=null?m.rating:'',
        m.review_count!=null?m.review_count:'',
        m.bsr!=null?'#'+m.bsr:'',
        (m.seller||'').replace(/"/g,'""'),
        m.price_change!=null?m.price_change.toFixed(2):'',
        m.price_change_pct!=null?m.price_change_pct.toFixed(1)+'%':'',
        m.bsr_change!=null?m.bsr_change:'',
        h.length>=2?'Yes':'No',
        h.length,
        lastTs
      ].map(function(v){return '"'+String(v).replace(/"/g,'""')+'"';}).join(',')+'\n';
    });
  });
  var blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'crossmart_groups_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();
  URL.revokeObjectURL(a.href);
}

loadData();
</script>
</body>
</html>
