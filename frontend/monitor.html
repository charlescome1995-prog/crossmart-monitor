<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart Monitor</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#eaeded;color:#0f1111;font-size:14px;min-height:100vh}

.topbar{background:#131921;color:#fff;display:flex;align-items:center;justify-content:space-between;height:48px;padding:0 24px;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:16px}
.topbar nav{display:flex;gap:14px;font-size:13px}
.topbar nav a{color:rgba(255,255,255,.75);text-decoration:none;padding:4px 0;border-bottom:2px solid transparent;transition:.15s}
.topbar nav a:hover,.topbar nav a.active{color:#fff;border-bottom-color:#e94560}

.filters{background:#fff;padding:10px 20px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;border-bottom:1px solid #d5d9d9;position:sticky;top:48px;z-index:99;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.filters select,.filters input{padding:6px 10px;border:1px solid #d5d9d9;border-radius:6px;font-size:13px;background:#fff;outline:none}
.filters input:focus,.filters select:focus{border-color:#007185;box-shadow:0 0 0 2px rgba(0,113,133,.15)}
.filters input{width:200px}
.filters label{font-size:13px;color:#555;display:flex;align-items:center;gap:4px;cursor:pointer}

.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;padding:12px 20px}
.met{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);padding:12px 8px;text-align:center}
.met .n{font-size:22px;font-weight:700;line-height:1.2}
.met .n.g1{color:#067d62}.met .n.r1{color:#B12704}.met .n.b1{color:#007185}.met .n.a1{color:#9e7800}
.met .l{font-size:10px;color:#687078;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

.card-list{background:#fff;border-radius:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin:0 20px 16px;overflow:hidden}
.card-hdr{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid #eee;font-weight:600;font-size:13px}

.prod-row{padding:10px 16px;border-bottom:1px solid #f0f2f2;display:grid;grid-template-columns:36px 64px 1fr auto;gap:12px;cursor:pointer;transition:background .12s;align-items:center}
.prod-row:hover{background:#f7fafc}
.prod-row:last-child{border-bottom:none}
.prod-row.active{background:#effaff;border-left:3px solid #007185}
.rank-num{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.rank-1{background:linear-gradient(135deg,#ffd700,#f5c518);color:#000;box-shadow:0 2px 6px rgba(255,215,0,.3)}
.rank-2{background:linear-gradient(135deg,#c0c0c0,#b0b0b0);color:#000;box-shadow:0 2px 6px rgba(192,192,192,.2)}
.rank-3{background:linear-gradient(135deg,#cd7f32,#b8860b);color:#fff;box-shadow:0 2px 6px rgba(205,127,50,.3)}
.rank-d{background:#e6e8ea;color:#555}

.info{min-width:0}.info .br{font-size:11px;color:#007185;font-weight:500;display:flex;align-items:center;gap:4px;flex-wrap:wrap}
.info .ti{font-size:12px;color:#555;line-height:1.3;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:500px}
.info .mt{font-size:11px;color:#888;display:flex;gap:6px;flex-wrap:wrap;margin-top:2px}

.price-col{text-align:right;min-width:80px}
.price-col .cur{color:#B12704;font-weight:700;font-size:16px}
.price-col .old{font-size:11px;color:#999;text-decoration:line-through}
.price-col .dc{font-size:10px;color:#067d62;background:#e8f5e9;padding:1px 5px;border-radius:4px;display:inline-block;margin-top:2px}
.tag{display:inline-block;padding:1px 6px;border-radius:4px;font-size:10px;background:#f0f8ff;color:#067d62;border:1px solid #ceead6;margin:1px}
.tag.g{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
.tag.r{background:#fef2f2;color:#991b1b;border-color:#fecaca}
.tag.y{background:#fffbeb;color:#92400e;border-color:#fde68a}

.chg{font-size:11px;font-weight:600;display:inline-flex;align-items:center;gap:2px}
.chg.up{color:#059669}.chg.down{color:#dc2626}.chg.flat{color:#999}

.detail-panel{display:none;background:#fafafa;padding:0;border-bottom:1px solid #e6e8ea}
.detail-panel.open{display:block}
.chart-wrap{padding:16px 20px;min-height:260px}
.chart-wrap canvas{width:100%!important;max-height:280px}

.loading{text-align:center;padding:40px;color:#999;font-size:13px}
.empty{text-align:center;padding:30px;color:#999;font-size:13px}
.err{text-align:center;padding:30px;color:#B12704;font-size:13px}

.btn{display:inline-flex;align-items:center;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:.15s;background:#e6e8ea;color:#0f1111}
.btn:hover{background:#d5d9d9}
.btn-p{background:#ffd814;color:#0f1111}.btn-p:hover{background:#f7ca00}
.btn-sm{padding:3px 10px;font-size:11px}

@media(max-width:768px){
  .topbar{padding:0 12px}
  .metrics{grid-template-columns:repeat(2,1fr);padding:8px 12px}
  .prod-row{grid-template-columns:28px 48px 1fr;gap:8px}
  .prod-row .price-col{display:none}
  .filters{top:44px;padding:8px 12px}
  .filters input{width:130px}
}
</style>
</head>
<body>

<div class="topbar">
  <span class="brand">📊 Cross<span style="color:#e94560">Mart</span></span>
  <nav>
    <a href="../index.html">Home</a>
    <a href="monitor.html" class="active">Monitor</a>
    <a href="selection.html">Selection</a>
  </nav>
</div>

<div class="filters">
  <input type="text" id="searchIn" placeholder="🔍 搜索标题/ASIN..." oninput="render()">
  <select id="sortBy" onchange="render()">
    <option value="price_chg">价格变化 ↓</option>
    <option value="bsr_chg">BSR改善 ↑</option>
    <option value="bsr">BSR排名 ↑</option>
    <option value="rating">评分 ↓</option>
    <option value="reviews">评论数 ↓</option>
    <option value="price">价格 ↓</option>
  </select>
  <label><input type="checkbox" id="onlyChg" onchange="render()"> 仅变化</label>
  <button class="btn btn-sm" onclick="refresh()">🔄 刷新</button>
</div>

<div id="metrics" class="metrics"></div>
<div id="listContainer" class="card-list">
  <div class="loading">⏳ 加载中...</div>
</div>

<script>
let allAsins = [];
let charts = {};

function refresh() {
  charts = {};
  document.getElementById('listContainer').innerHTML = '<div class="loading">⏳ 加载中...</div>';
  loadData();
}

async function loadData() {
  try {
    const r = await fetch('data/monitor-data.json?' + Date.now());
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    allAsins = data.asins || [];
    renderMetrics();
    render();
  } catch(e) {
    document.getElementById('listContainer').innerHTML =
      '<div class="err">❌ 数据加载失败: ' + e.message + '</div>';
  }
}

function renderMetrics() {
  const a = allAsins;
  const total = a.length;
  const priceChg = a.filter(x => x.price_change_pct && Math.abs(x.price_change_pct) > 0.01).length;
  const bsrBetter = a.filter(x => x.bsr_change && x.bsr_change < 0).length;
  const updated = a._updated || '—';
  document.getElementById('metrics').innerHTML =
    `<div class="met"><div class="n b1">${total}</div><div class="l">📦 监控ASIN</div></div>
     <div class="met"><div class="n ${priceChg > 0 ? 'r1' : 'a1'}">${priceChg}</div><div class="l">📈 价格波动</div></div>
     <div class="met"><div class="n g1">${bsrBetter}</div><div class="l">🔄 BSR改善</div></div>
     <div class="met"><div class="n a1">${getUpdatedStr()}</div><div class="l">🕐 最后更新</div></div>`;
}

function getUpdatedStr() {
  for (const a of allAsins) {
    if (a.history && a.history.length) {
      const t = a.history[a.history.length-1].timestamp;
      if (t) return t.substring(5,16).replace('T',' ');
    }
  }
  return '—';
}

function formatNum(n) {
  if (n === null || n === undefined || n === '') return '-';
  if (n >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (n >= 1000) return n.toLocaleString();
  return n;
}

function changeHTML(label, val, pct, invert = false) {
  if (!val && val !== 0) return '';
  const v = parseFloat(val);
  if (Math.abs(v) < 0.01) return '<span class="chg flat">➡️ 不变</span>';
  const isUp = invert ? v < 0 : v > 0;
  const cls = isUp ? 'up' : 'down';
  const arrow = isUp ? '🔺' : '🔻';
  const pctStr = pct ? ` (${Math.abs(pct).toFixed(1)}%)` : '';
  return `<span class="chg ${cls}">${arrow} ${Math.abs(v).toFixed(v % 1 === 0 ? 0 : 2)}${pctStr}</span>`;
}

function bsrArrow(val) {
  if (!val && val !== 0) return '';
  const v = parseInt(val);
  if (v === 0) return '<span class="chg flat">➡️</span>';
  return v < 0
    ? `<span class="chg up">🔻 ${Math.abs(v).toLocaleString()} (改善)</span>`
    : `<span class="chg down">🔺 ${v.toLocaleString()} (恶化)</span>`;
}

function toggleChart(idx) {
  const elId = 'detail-' + idx;
  const el = document.getElementById(elId);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  // Close all
  document.querySelectorAll('.detail-panel').forEach(p => p.classList.remove('open'));
  document.querySelectorAll('.prod-row').forEach(r => r.classList.remove('active'));
  if (!isOpen) {
    el.classList.add('open');
    el.parentElement.classList.add('active');
    drawChart(idx, el);
  }
}

function drawChart(idx, el) {
  const a = allAsins[idx];
  if (!a || !a.history || a.history.length < 2) return;
  const canvas = el.querySelector('canvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const cid = 'chart-' + idx;
  if (charts[cid]) { charts[cid].destroy(); delete charts[cid]; }
  
  const hist = a.history;
  const labels = hist.map(h => {
    const d = h.timestamp || '';
    return d.length >= 16 ? d.substring(5,16) : d;
  });
  const prices = hist.map(h => h.price);
  const bsrs = hist.map(h => h.bsr);
  
  // Filter nulls
  const validPrices = prices.filter(p => p !== null && p !== undefined);
  const validBsrs = bsrs.filter(b => b !== null && b !== undefined);
  
  charts[cid] = new Chart(ctx, {
    type: 'line',
    data: {
      labels: labels,
      datasets: [
        {
          label: '价格 ($)',
          data: prices,
          borderColor: '#007185',
          backgroundColor: 'rgba(0,113,133,0.08)',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5,
          yAxisID: 'y',
        },
        {
          label: 'BSR 排名',
          data: bsrs,
          borderColor: '#dc2626',
          backgroundColor: 'rgba(220,38,38,0.06)',
          fill: true,
          tension: 0.3,
          pointRadius: 3,
          pointHoverRadius: 5,
          yAxisID: 'y1',
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { usePointStyle: true, padding: 16, font: { size: 11 } }
        },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              if (ctx.dataset.label.includes('价格'))
                return ctx.dataset.label + ': $' + ctx.parsed.y.toFixed(2);
              return ctx.dataset.label + ': #' + Math.round(ctx.parsed.y).toLocaleString();
            }
          }
        }
      },
      scales: {
        x: { grid: { display: false }, ticks: { maxRotation: 45, font: { size: 10 } } },
        y: {
          type: 'linear',
          display: true,
          position: 'left',
          title: { display: true, text: '价格 ($)', font: { size: 11 } },
          grid: { color: 'rgba(0,0,0,0.04)' },
          ticks: { font: { size: 10 } }
        },
        y1: {
          type: 'linear',
          display: true,
          position: 'right',
          reverse: true,
          title: { display: true, text: 'BSR 排名', font: { size: 11 } },
          grid: { drawOnChartArea: false },
          ticks: { font: { size: 10 } }
        }
      }
    }
  });
}

function render() {
  const search = (document.getElementById('searchIn').value || '').toLowerCase().trim();
  const sortBy = document.getElementById('sortBy').value;
  const onlyChg = document.getElementById('onlyChg').checked;
  
  let list = [...allAsins];
  
  if (search) {
    list = list.filter(a =>
      (a.title || '').toLowerCase().includes(search) ||
      (a.asin || '').toLowerCase().includes(search)
    );
  }
  
  if (onlyChg) {
    list = list.filter(a =>
      (a.price_change_pct && Math.abs(a.price_change_pct) > 0.01) ||
      (a.bsr_change && a.bsr_change !== 0)
    );
  }
  
  // Sort
  const sortMap = {
    'price_chg': (a,b) => Math.abs(b.price_change_pct||0) - Math.abs(a.price_change_pct||0),
    'bsr_chg': (a,b) => (a.bsr_change||0) - (b.bsr_change||0),
    'bsr': (a,b) => (a.bsr||999999) - (b.bsr||999999),
    'rating': (a,b) => (b.rating||0) - (a.rating||0),
    'reviews': (a,b) => (b.review_count||0) - (a.review_count||0),
    'price': (a,b) => (b.price||0) - (a.price||0),
  };
  list.sort(sortMap[sortBy] || sortMap['price_chg']);
  
  const container = document.getElementById('listContainer');
  
  if (list.length === 0) {
    container.innerHTML = '<div class="empty">没有匹配的ASIN</div>';
    return;
  }
  
  let html = `<div class="card-hdr"><span>📡 ASIN 监控 (${list.length})</span><span style="font-size:11px;color:#999">点击查看趋势</span></div>`;
  
  list.forEach((a, i) => {
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-d';
    const hasHistory = a.history && a.history.length >= 2;
    const dict = a.list_price && a.list_price > 0 && a.price < a.list_price
      ? Math.round((1 - a.price / a.list_price) * 100) : 0;
    const priceStr = a.price ? '$' + a.price.toFixed(2) : '—';
    const oldStr = (dict > 0 && a.list_price) ? '<div class="old">$' + a.list_price.toFixed(2) + '</div>' : '';
    const dcTag = dict > 0 ? '<span class="tag g">-' + dict + '%</span>' : '';
    
    html += '<div class="prod-row" onclick="toggleChart(' + i + ')">' +
      '<div class="rank-num ' + rankClass + '">#' + (i+1) + '</div>' +
      '<div style="width:64px;height:64px;flex-shrink:0;background:#f5f5f5;border-radius:6px;overflow:hidden">' +
        '<img src="' + (a.main_image || '') + '" style="width:64px;height:64px;object-fit:cover" alt="" onerror="this.style.display=\'none\'">' +
      '</div>' +
      '<div class="info">' +
        '<div class="br">' +
          (a.brand || '—') +
          ' <span class="tag">⭐ ' + formatNum(a.rating) + '</span>' +
          ' <span class="tag">💬 ' + formatNum(a.review_count) + '</span>' +
        '</div>' +
        '<div class="ti">' + (a.title || '').substring(0, 80) + '</div>' +
        '<div class="mt">' +
          '<span class="tag">🔗 ' + a.asin + '</span>' +
          (a.bsr ? '<span class="tag y">🏷️ #' + formatNum(a.bsr) + '</span>' : '') +
          (a.history && a.history.length > 1 ? '<span class="tag">📊 ' + a.history.length + '帧</span>' : '') +
          ' ' + changeHTML('价格', a.price_change, a.price_change_pct) +
          ' ' + bsrArrow(a.bsr_change) +
        '</div>' +
      '</div>' +
      '<div class="price-col">' +
        '<div class="cur">' + priceStr + '</div>' +
        oldStr + dcTag +
      '</div>' +
      '<div class="detail-panel" id="detail-' + i + '">' +
        '<div class="chart-wrap">' +
          (hasHistory
            ? '<canvas id="cv-' + i + '"></canvas>'
            : '<div style="text-align:center;color:#999;padding:20px;font-size:12px">仅1个快照，暂无历史趋势数据</div>') +
        '</div>' +
        (a.seller ? '<div style="padding:4px 20px 12px;font-size:11px;color:#888">卖家: ' + a.seller + '</div>' : '') +
      '</div>' +
    '</div>';
  });
  
  container.innerHTML = html;
}

loadData();
</script>
</body>
</html>
