<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart Monitor Pro</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:"Times New Roman",Times,"PingFang SC","Microsoft YaHei",serif}
body{background:#f4f7f6;color:#333;padding:0;font-size:13px}
.topbar{background:#131921;color:#fff;display:flex;align-items:center;justify-content:space-between;height:44px;padding:0 16px;position:sticky;top:0;z-index:100}
.topbar .brand{font-weight:700;font-size:16px;letter-spacing:.5px}
.topbar nav{display:flex;gap:18px;font-size:13px}
.topbar nav a{color:rgba(255,255,255,.75);text-decoration:none;padding:4px 0;border-bottom:2px solid transparent}
.topbar nav a:hover,.topbar nav a.active{color:#fff;border-bottom-color:#e94560}
.container{padding:16px}
.config-matrix{background:#fff;padding:14px;border-radius:6px;margin-bottom:16px;box-shadow:0 1px 3px rgba(0,0,0,.05);border:1px solid #e2e8f0}
.action-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed #e2e8f0;flex-wrap:wrap;gap:10px}
.title-tag{font-size:12px;font-weight:700;color:#1e293b;background:#f1f5f9;padding:4px 10px;border-radius:4px;border:1px solid #cbd5e1}
.ctrl-group{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.ctrl-group input{padding:5px 8px;border:1px solid #cbd5e1;border-radius:4px;font-size:12px;height:30px}
.ctrl-group button{background:#e94560;color:#fff;border:none;border-radius:4px;padding:0 15px;font-size:12px;font-weight:600;cursor:pointer;height:30px;transition:.2s}
.ctrl-group button:hover{background:#d03d56}
.ctrl-group button:disabled{background:#ccc;cursor:not-allowed}
.ctrl-group span{font-size:12px;padding:4px 10px;border-radius:20px;background:#e2e8f0;color:#64748b;white-space:nowrap}
/* Matrix grid */
.matrix-grid{display:grid;grid-template-columns:65px repeat(5,1fr) repeat(5,1fr);gap:6px;min-width:1100px}
.grid-cell{display:flex;align-items:center}
.lbl-cell{font-size:11px;font-weight:700;color:#475569;border:1px solid #cbd5e1;border-radius:3px;background:#f8fafc;height:28px;justify-content:center;width:100%}
.matrix-grid input[type="text"]{width:100%;padding:4px 8px;border:1px solid #cbd5e1;border-radius:4px;font-size:12px;height:28px;outline:none}
.matrix-grid input[type="text"]:focus{border-color:#e94560}
.row-target input{font-weight:700;border-color:#94a3b8;background:#fff}
.row-rel input{font-size:11px;color:#475569;background:#fafafa;border-color:#e2e8f0}
.grid-hdr{font-size:10px;color:#94a3b8;font-weight:600;text-align:center;padding-bottom:2px;text-transform:uppercase}
.hdr-asin{border-bottom:2px solid #e0e7ff;color:#4f46e5}
.hdr-kw{border-bottom:2px solid #fce7f3;color:#db2777}
.filter-bar{background:#fff;padding:12px;border-radius:6px 6px 0 0;border:1px solid #e2e8f0;border-bottom:none;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}
.filter-controls{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.filter-controls input{padding:6px 12px;border:1px solid #cbd5e1;border-radius:4px;width:240px;font-size:13px}
.filter-controls select{padding:6px 12px;border:1px solid #cbd5e1;border-radius:4px;font-size:13px;background:#f8fafc;cursor:pointer;font-weight:600}
.filter-controls label{display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn{padding:6px 16px;border-radius:4px;font-size:13px;font-weight:600;cursor:pointer;border:none;transition:.1s}
.btn-secondary{background:#e2e8f0;color:#334155}
.table-container{background:#fff;border-radius:0 0 6px 6px;border:1px solid #e2e8f0;overflow-x:auto;box-shadow:0 1px 3px rgba(0,0,0,.05)}
.monitor-table{width:100%;border-collapse:collapse;text-align:left;white-space:nowrap}
.monitor-table th{background:#f8fafc;padding:12px;font-size:12px;font-weight:700;color:#334155;border-bottom:2px solid #e2e8f0;text-transform:uppercase}
.monitor-table td{padding:12px;border-bottom:1px solid #f1f5f9;vertical-align:middle}
.monitor-table tr:hover td{background:#fcfdfe}
.col-img{width:75px;text-align:center}
.col-img img{width:65px;height:85px;object-fit:contain;border-radius:4px;border:1px solid #e2e8f0;background:#fff}
.info-block{display:flex;flex-direction:column;gap:4px}
.metrics-block{display:flex;flex-direction:column;gap:5px;font-size:12px}
.cat-item{color:#475569;font-size:11px;background:#f1f5f9;padding:1px 6px;border-radius:3px;display:inline-block;max-width:220px;overflow:hidden;text-overflow:ellipsis}
.badge{font-size:10px;padding:2px 5px;border-radius:3px;font-weight:bold;display:inline-block}
.badge.main{background:#ffd814;color:#0f1111}
.badge.rel{background:#cbd5e1;color:#334155}
.badge.source-asin{background:#e0e7ff;color:#4f46e5}
.badge.source-kw{background:#fce7f3;color:#db2777}
.asin-link{font-weight:700;color:#007185;text-decoration:none;font-size:13px}
.title-text{max-width:220px;overflow:hidden;text-overflow:ellipsis;color:#64748b;font-size:12px;line-height:1.3}
.chg{font-weight:700;padding:1px 4px;border-radius:3px;font-size:11px;margin-left:4px}
.chg.up{color:#dc2626;background:#fef2f2}
.chg.dn{color:#059669;background:#f0fdf4}
.events-cell{display:flex;flex-direction:column;gap:4px;max-width:180px;white-space:normal}
.e-tag{font-size:10px;padding:2px 6px;border-radius:4px;font-weight:600;border:1px solid transparent;display:inline-block;width:fit-content}
.e-alert{background:#fef2f2;color:#dc2626;border-color:#fca5a5}
.e-none{color:#94a3b8;font-size:11px}
.status-indicator{display:inline-flex;align-items:center;gap:6px;font-size:12px;font-weight:700;padding:5px 10px;border-radius:4px;width:85px;justify-content:center}
.status-indicator.changed{background:#dc2626;color:#fff}
.status-indicator.stable{background:#059669;color:#fff}
.diff-cell{font-size:12px;line-height:1.6;min-width:90px}
.diff-item{display:flex;align-items:center;gap:4px}
.diff-arrow{font-size:11px}
.diff-arrow.up{color:#dc2626}
.diff-arrow.dn{color:#059669}
.diff-arrow.same{color:#94a3b8}
.diff-val{font-weight:700}
.diff-val.up{color:#dc2626}
.diff-val.dn{color:#059669}
.diff-val.same{color:#64748b}
.diff-none{color:#cbd5e1;font-size:11px}
</style>
</head>

<script>
(function() {
  var REPO = 'charlescome1995-prog/crossmart-monitor';
  var RAW_DATA_URL = 'https://raw.githubusercontent.com/' + REPO + '/main/frontend/data/rawData.json';
  var rawData = { updated: '', items: [], keywords: [] };

  window.addEventListener('DOMContentLoaded', function() {
    var saved = localStorage.getItem('gh_token') || '';
    var ti = document.getElementById('ghTokenInput');
    if (ti && saved) ti.value = saved;
    loadGitHubConfig();
    loadRawData();
  });

  function loadGitHubConfig() {
    var se = document.getElementById('configStatus');
    fetch('https://raw.githubusercontent.com/' + REPO + '/main/backend/data/user_config.json?v=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error('Config not found'); return r.json(); })
      .then(function(cfg) {
        applyConfig(cfg);
        se.textContent = '配置加载成功';
        se.style.background = '#d1fae5';
        se.style.color = '#065f46';
      })
      .catch(function() {
        // silent fail, use defaults
      });
  }

  function applyConfig(cfg) {
    if (cfg && cfg.asins) {
      cfg.asins.forEach(function(row, i) {
        if (i < 5) {
          var mainEl = document.getElementById('in-asin-' + i);
          if (mainEl && row.main) mainEl.value = row.main;
          if (row.related) {
            row.related.forEach(function(val, ri) {
              if (ri < 5) {
                var relEl = document.getElementById('rel-asin-' + i + '-' + ri);
                if (relEl) relEl.value = val;
              }
            });
          }
        }
      });
    }
    if (cfg && cfg.keywords) {
      cfg.keywords.forEach(function(row, i) {
        if (i < 5) {
          var kwEl = document.getElementById('in-kw-' + i);
          if (kwEl && row.main) kwEl.value = row.main;
          if (row.related) {
            row.related.forEach(function(val, ri) {
              if (ri < 5) {
                var relEl = document.getElementById('rel-kw-' + i + '-' + ri);
                if (relEl) relEl.value = val;
              }
            });
          }
        }
      });
    }
  }

  function loadRawData() {
    var se = document.getElementById('configStatus');
    se.textContent = '加载中...';
    se.style.background = '#fef3c7';
    se.style.color = '#92400e';
    fetch(RAW_DATA_URL + '?t=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(d) {
        rawData = d;
        renderTable();
        se.textContent = '数据加载成功';
        se.style.background = '#d1fae5';
        se.style.color = '#065f46';
      })
      .catch(function(e) {
        console.warn(e);
        se.textContent = '加载失败';
        se.style.background = '#fee2e2';
        se.style.color = '#991b1b';
        renderTable();
      });
  }

  function saveToken() {
    var ti = document.getElementById('ghTokenInput');
    var t = ti ? ti.value.trim() : '';
    if (!t) { alert('请输入 GitHub Token'); return; }
    localStorage.setItem('gh_token', t);
    alert('Token 已保存，开始加载数据...');
    loadRawData();
  }

  function getRelatedVals(type, streamIdx) {
    var vals = [];
    for (var r = 0; r < 5; r++) {
      var el = document.getElementById('rel-' + type + '-' + streamIdx + '-' + r);
      if (el && el.value.trim()) vals.push(el.value.trim());
    }
    return vals;
  }

  
  function checkLocalAPI() {
    return fetch('http://127.0.0.1:8765/api/status', { method: 'GET', signal: AbortSignal.timeout(3000) })
      .then(function(r) { return r.ok ? true : false; })
      .catch(function() { return false; });
  }

  function triggerMonitor() {
    var btn = document.getElementById('btnTrigger');
    var se = document.getElementById('configStatus');
    var token = (document.getElementById('ghTokenInput') || {}).value.trim();
    if (!token) {
      alert('请先输入 GitHub Token'); return;
    }
    btn.disabled = true;
    btn.textContent = '\u89e6\u53d1\u4e2d...';
    se.textContent = '\u68c0\u67e5\u672c\u5730\u8fde\u63a5...';
    se.style.background = '#fef3c7';
    se.style.color = '#92400e';

    checkLocalAPI().then(function(localOk) {
      if (!localOk) {
        btn.disabled = false;
        btn.textContent = '\u7acb\u5373\u62e8\u53d6';
        se.textContent = '\u672c\u5730\u811a\u672c\u672a\u542f\u52a8\uff0c\u8bf7\u5148\u6253\u5f00 api_server.py';
        se.style.background = '#fee2e2';
        se.style.color = '#991b1b';
        alert('本地采集脚本未运行！\n\n请在闫旭电脑上打开命令行，运行：\npython backend\\api_server.py\n\n然后刷新此页面再试。');
        return;
      }

      var asins = [], kws = [];
      for (var i = 0; i < 5; i++) {
        var mainA = (document.getElementById('in-asin-' + i) || {}).value || '';
        if (mainA.trim()) asins.push({ main: mainA.trim(), related: getRelatedVals('asin', i) });
      }
      for (var j = 0; j < 5; j++) {
        var mainK = (document.getElementById('in-kw-' + j) || {}).value || '';
        if (mainK.trim()) kws.push({ main: mainK.trim(), related: getRelatedVals('kw', j) });
      }
      var cfg = { asins: asins, keywords: kws };
      var trigger = { status: 'pending', triggered_at: new Date().toISOString() };

      Promise.all([
        putFile('backend/data/user_config.json', cfg, token),
        putFile('backend/data/trigger.json', trigger, token)
      ])
      .then(function() {
        se.textContent = '\u540c\u65f6\u547c\u54c8\u672c\u5730\u811a\u672c...';
        se.style.background = '#dbeafe';
        se.style.color = '#1e40af';
        btn.textContent = '\u8f6e\u8be2\u4e2d';
        return fetch('http://127.0.0.1:8765/api/trigger', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(cfg)
        });
      })
      .then(function(r) { return r ? r.json() : null; })
      .then(function(data) {
        if (data && data.status === 'busy') {
          se.textContent = '\u672c\u5730\u6b63\u5728\u8fd0\u884c\uff0c\u8bf7\u7a0d\u5019...';
        } else {
          se.textContent = '\u5df2\u89e6\u53d1\uff0c\u8bf7\u7a0d\u5019... (\u6b63\u5e38\u8f6e\u8be2 30s)';
        }
        pollStatus(token);
      })
      .catch(function(e) {
        se.textContent = '\u672c\u5730\u8054\u63a5\u5931\u8d25\uff0c\u4f46\u4e91\u7aef\u5df2\u5199\u5165';
        se.style.background = '#fef3c7';
        se.style.color = '#92400e';
        pollStatus(token);
      });
    });
  }

  var pollTimer = null;
  function pollStatus(token) {
    if (pollTimer) clearTimeout(pollTimer);
    fetch('https://raw.githubusercontent.com/' + REPO + '/main/backend/data/trigger.json?t=' + Date.now())
      .then(function(r) { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
      .then(function(data) {
        var se = document.getElementById('configStatus');
        var btn = document.getElementById('btnTrigger');
        if (data.status === 'pending') {
          se.textContent = '\u8f6e\u8be2\u4e2d... ' + (data.progress || '');
          se.style.background = '#dbeafe';
          se.style.color = '#1e40af';
          btn.textContent = '\u8f6e\u8be2\u4e2d';
          pollTimer = setTimeout(function() { pollStatus(token); }, 30000);
        } else {
          se.textContent = '\u6570\u636e\u5df2\u66f4\u65b0\uff0c\u5237\u65b0\u9875\u9762';
          se.style.background = '#d1fae5';
          se.style.color = '#065f46';
          btn.textContent = '\u5df2\u5b8c\u6210';
          btn.disabled = false;
          loadRawData();
        }
      })
      .catch(function() {
        var se = document.getElementById('configStatus');
        se.textContent = '\u7b49\u5f85\u4e91\u7aef\u54cd\u5e94... (30s)';
        pollTimer = setTimeout(function() { pollStatus(token); }, 30000);
      });
  }


  function b64enc(str) {
    return btoa(unescape(encodeURIComponent(str)));
  }

  function putFile(path, content, token) {
    var url = 'https://api.github.com/repos/' + REPO + '/contents/' + path;
    return fetch(url, { headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json' } })
      .then(function(r) { return r.ok ? r.json() : {}; })
      .then(function(d) {
        return fetch(url, {
          method: 'PUT',
          headers: { 'Authorization': 'Bearer ' + token, 'Accept': 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: 'user: trigger capture', content: b64enc(JSON.stringify(content)), sha: d.sha || '' })
        });
      })
      .then(function(r) { if (!r.ok) throw new Error('API ' + r.status); });
  }

  function renderTable() {
    var tb = document.getElementById('tableBody');
    if (!tb || !rawData.items) { tb.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:20px;">暂无数据</td></tr>'; return; }
    var searchTxt = (document.getElementById('searchInput') || {}).value || '';
    var sourceFilter = (document.getElementById('sourceFilter') || {}).value || 'ALL';
    var onlyChg = (document.getElementById('changeFilter') || {}).checked || false;
    searchTxt = searchTxt.toLowerCase();
    var html = '';
    rawData.items.forEach(function(item) {
      var isStatusAnomaly = item.listing_status !== item.expected_listing_status;
      var isCatAnomaly = item.main_cat !== item.expected_main_cat || item.sub_cat !== item.expected_sub_cat;
      var isInfoAnomaly = item.title_changed || item.img_changed || item.bullets_changed || item.description_changed;
      var isVariantAnomaly = item.variant_changed;
      var hasActiveAnomaly = item.chg !== 0 || isStatusAnomaly || isCatAnomaly || isInfoAnomaly || isVariantAnomaly || (item.badges_lost && item.badges_lost.length > 0);
      if (sourceFilter !== 'ALL' && item.monitor_type !== sourceFilter) return;
      if (searchTxt && !item.asin.toLowerCase().includes(searchTxt) && !(item.title && item.title.toLowerCase().includes(searchTxt))) return;
      if (onlyChg && !hasActiveAnomaly) return;
      var activeEvents = (item.events || []).slice();
      if (isStatusAnomaly) activeEvents.push({ cls: 'e-alert', txt: '商品状态异常' });
      if (isInfoAnomaly) activeEvents.push({ cls: 'e-alert', txt: '商品信息变化' });
      if (isCatAnomaly) activeEvents.push({ cls: 'e-alert', txt: '分类异常' });
      if (item.badges_lost && item.badges_lost.length) item.badges_lost.forEach(function(b) { activeEvents.push({ cls: 'e-alert', txt: '丢失: ' + b }); });
      var chgClass = item.chg > 0 ? 'up' : (item.chg < 0 ? 'dn' : '');
      var chgText = item.chg !== 0 ? (item.chg > 0 ? '\u25B2 $' + Math.abs(item.chg) : '\u25BC $' + Math.abs(item.chg)) : '';
      var diff = item.diff || {};
      var diffHtml = buildDiffHtml(diff);
      var eventsHtml = activeEvents.length ? activeEvents.map(function(e) { return '<span class="e-tag ' + e.cls + '">' + e.txt + '</span>'; }).join('') : '<span class="e-none">无事件</span>';
      var priceStr = item.price != null ? '$' + item.price : '-';
      var ratingStr = item.rating != null ? item.rating : '-';
      var reviewsStr = item.reviews != null ? item.reviews : '-';
      var mainBsrStr = item.main_bsr != null ? '#' + item.main_bsr : '-';
      var subBsrStr = item.sub_bsr != null ? ' / #' + item.sub_bsr : '';
      var variantHtml = item.variant_status && item.variant_status !== '正常' ? ' <span style="color:#d97706;font-size:12px;">变体:' + item.variant_status + '</span>' : '';
      var statusClass = hasActiveAnomaly ? 'changed' : 'stable';
      var statusText = hasActiveAnomaly ? '有变化' : '正常';
      var badgeHtml = (item.badges_current && item.badges_current.length) ? '<div style="margin-top:3px">' + item.badges_current.map(function(b) { return '<span style="background:#fef3c7;color:#d97706;font-size:10px;padding:1px 5px;border-radius:3px;margin-right:3px;font-weight:700;">' + b + '</span>'; }).join('') + '</div>' : '';
      var dealHtml = item.deal_activity && item.deal_activity !== '\u65e0' ? '<div style="color:#d97706;font-size:12px;">Deal: ' + item.deal_activity + '</div>' : '';
      var couponHtml = item.coupon && item.coupon !== '\u65e0' ? '<div style="color:#059669;font-size:12px;">代金券: ' + item.coupon + '</div>' : '';
      var primeHtml = item.prime_discount && item.prime_discount !== '\u672a\u5f00\u542f' ? '<div style="color:#7c3aed;font-size:12px;">Prime: ' + item.prime_discount + '</div>' : '';
      html += '<tr>' +
        '<td class="col-img"><img src="' + (item.img || '') + '"></td>' +
        '<td><div class="info-block">' +
          '<div><span class="badge ' + (item.monitor_type === 'ASIN' ? 'source-asin' : 'source-kw') + '">' + (item.monitor_type || '') + '</span> <span class="badge ' + (item.is_main ? 'main' : 'rel') + '">' + (item.logic_type || '') + '</span></div>' +
          '<div><a href="https://www.amazon.com/dp/' + (item.asin || '') + '" target="_blank" class="asin-link">' + (item.asin || '') + '</a> [' + (item.brand || '') + ']</div>' +
          '<div class="title-text" title="' + (item.title || '') + '">' + (item.title || '') + '</div>' +
        '</div></td>' +
        '<td><div class="metrics-block">' +
          '<div>价格: <strong>' + priceStr + '</strong> <span class="chg ' + chgClass + '">' + chgText + '</span></div>' +
          '<div>评分: <strong>' + ratingStr + '</strong> <span style="color:#64748b;font-size:12px;">评论 ' + reviewsStr + '</span></div>' +
          '<div>BSR: <span class="cat-item">' + (item.main_cat || '-') + '</span> <strong>' + mainBsrStr + '</strong>' + subBsrStr + '</div>' +
          '<div>状态: <span style="color:' + (isStatusAnomaly ? '#dc2626' : '#16a34a') + ';font-weight:700;">' + (item.listing_status || '-') + '</span>' + variantHtml + '</div>' +
          badgeHtml + dealHtml + couponHtml + primeHtml +
        '</div></td>' +
        '<td><div class="events-cell">' + eventsHtml + '</div></td>' +
        '<td><div class="diff-cell">' + diffHtml + '</div></td>' +
        '<td><div style="color:#94a3b8;font-size:11px;">-</div></td>' +
        '<td><div class="status-indicator ' + statusClass + '">' + statusText + '</div></td>' +
        '<td style="color:#64748b;font-size:12px;">' + (rawData.updated || '-') + '</td>' +
      '</tr>';
    });
    tb.innerHTML = html || '<tr><td colspan="8" style="text-align:center;padding:20px;">没有匹配数据</td></tr>';
  }

  function buildDiffHtml(diff) {
    if (!diff || Object.keys(diff).length === 0) return '<span class="diff-none">-</span>';
    var rows = [];
    if (diff.price) { var dir = diff.price.direction || 'same'; var arrow = dir === 'up' ? '\u2191' : (dir === 'dn' ? '\u2193' : '-'); rows.push('<div class="diff-item"><span class="diff-arrow ' + dir + '">' + arrow + '</span> 价格: <span class="diff-val ' + dir + '">$' + diff.price.current + '</span></div>'); }
    if (diff.review_count) { var dir = diff.review_count.direction || 'same'; var arrow = dir === 'up' ? '\u2191' : (dir === 'dn' ? '\u2193' : '-'); rows.push('<div class="diff-item"><span class="diff-arrow ' + dir + '">' + arrow + '</span> 评论: <span class="diff-val ' + dir + '">' + diff.review_count.change + '</span></div>'); }
    if (diff.rating) { var dir = diff.rating.direction || 'same'; var arrow = dir === 'up' ? '\u2191' : (dir === 'dn' ? '\u2193' : '-'); rows.push('<div class="diff-item"><span class="diff-arrow ' + dir + '">' + arrow + '</span> 评分: <span class="diff-val ' + dir + '">' + diff.rating.change + '</span></div>'); }
    if (diff.bsr) { var dir = diff.bsr.direction || 'same'; var arrow = dir === 'up' ? '\u2191' : (dir === 'dn' ? '\u2193' : '-'); rows.push('<div class="diff-item"><span class="diff-arrow ' + dir + '">' + arrow + '</span> BSR: <span class="diff-val ' + dir + '">' + diff.bsr.change + '</span></div>'); }
    return rows.join('') || '<span class="diff-none">-</span>';
  }

  function exportToExcel() {
    var rows = [['监控类型', '逻辑类型', '商品状态', '价格', 'BSR', '评分', '评论数', '最后更新']];
    rawData.items.forEach(function(m) { rows.push([m.asin, m.monitor_type, m.logic_type, m.listing_status, m.price, m.main_bsr, m.rating, m.reviews, rawData.updated]); });
    var ws = XLSX.utils.aoa_to_sheet(rows);
    var wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb, ws, 'Monitor');
    XLSX.writeFile(wb, 'Monitor_' + (rawData.updated || 'unknown').replace(/[: ]/g, '_') + '.xlsx');
  }

  document.getElementById('btnTrigger').addEventListener('click', triggerMonitor);
  document.getElementById('btnSaveToken').addEventListener('click', saveToken);
  document.getElementById('btnExport').addEventListener('click', exportToExcel);
})();
</script>
</body>
</html>
