<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrossMart - 选品</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#eaeded;color:#0f1111;font-size:14px}
.topbar{background:#131921;color:white;padding:10px 20px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100}
.topbar a{color:#ddd;text-decoration:none;padding:4px 10px;border-radius:4px;font-size:13px}
.topbar a.active{background:#e94560;color:white}
.card{background:white;border:1px solid #d5d9d9;border-radius:8px;overflow:hidden;margin:12px 16px}
.card-header{background:#f5f5f5;padding:10px 16px;font-weight:600;border-bottom:1px solid #ddd;display:flex;justify-content:space-between;align-items:center}
.prod-row{padding:12px 16px;border-bottom:1px solid #e6e8ea;display:grid;grid-template-columns:auto 1fr auto;gap:12px;align-items:center}
.prod-row:last-child{border-bottom:none}
.rank{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.rank-1{background:#ffd700;color:#000}
.rank-2{background:#c0c0c0;color:#000}
.rank-3{background:#cd7f32;color:white}
.rank-default{background:#e6e8ea;color:#555}
.info .kw{font-weight:600;font-size:13px;color:#007185}
.info .title{font-size:12px;color:#555;line-height:1.4;margin:2px 0}
.info .meta{font-size:11px;color:#999}
.price{color:#B12704;font-weight:700;font-size:15px}
.score{background:#067d62;color:white;padding:3px 8px;border-radius:10px;font-size:11px;font-weight:600;white-space:nowrap}
.metrics{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center;padding:12px 16px;background:#fafafa}
.metrics .num{font-size:18px;font-weight:700}
.metrics .lb{font-size:10px;color:#999;text-transform:uppercase}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:10px;background:#f0f8ff;color:#067d62;border:1px solid #ceead6;margin:1px}
a.asin-link{color:#007185;font-size:11px;text-decoration:none}
a.asin-link:hover{text-decoration:underline;color:#c45500}
</style>
</head>
<body>

<div class="topbar">
  <span style="font-weight:700;font-size:14px">📊 CrossMart</span>
  <a href="../index.html">Home</a>
  <a href="monitor.html">监控</a>
  <a href="products.html" class="active">选品</a>
</div>

<div style="padding:8px 16px;background:#fefce8;border-bottom:1px solid #fde68a;font-size:12px;color:#92400e;text-align:center">
  选品基于卖家精灵数据 + 蒙特卡洛模拟评分，激进推广90天利润排序
</div>

<div id="app"></div>

<script>
async function load() {
  const r = await fetch('data/selection-data.json?' + Date.now());
  const data = await r.json();
  const products = data.products || [];
  document.getElementById('app').innerHTML = `
    <div class="card">
      <div class="card-header">
        <span>🏆 选品推荐 Top ${products.length}</span>
        <span style="font-size:12px;color:#999">${data.generated} 更新</span>
      </div>
      <div class="metrics">
        <div><div class="num">${products.length}</div><div class="lb">推荐产品</div></div>
        <div><div class="num">${products.filter(p => (p.毛利率||0) >= 25).length}</div><div class="lb">高毛利(>25%)</div></div>
        <div><div class="num">${products.filter(p => (p.综合评分||0) >= 85).length}</div><div class="lb">高评分(≥85)</div></div>
      </div>
      ${products.map(p => {
        const rankClass = p.rank === 1 ? 'rank-1' : p.rank === 2 ? 'rank-2' : p.rank === 3 ? 'rank-3' : 'rank-default';
        const asin = p.ASIN || '';
        const title = (p.商品标题 || '').substring(0, 60);
        return '<div class="prod-row">' +
          '<div class="rank ' + rankClass + '">#' + p.rank + '</div>' +
          '<div class="info">' +
            '<div class="kw">' + (p.关键词||'') + ' <span class="score">' + (p.综合评分||0) + '分</span></div>' +
            '<div class="title">' + title + '</div>' +
            '<div class="meta">' +
              '<span class="tag">⭐' + (p.星级评分||'') + '</span>' +
              '<span class="tag">💬' + (p.评论数||0) + '</span>' +
              '<span class="tag">📦' + (p.卖家数量||0) + '卖家</span>' +
              '<span class="tag">💰$' + (p.预估利润||0) + '/件</span>' +
              '<span class="tag">📈' + (p.毛利率||0) + '%</span>' +
              (asin ? '<a class="asin-link" href="https://www.amazon.com/dp/' + asin + '" target="_blank">🔗ASIN</a>' : '') +
            '</div>' +
          '</div>' +
          '<div class="price">$' + (p.当前价格||'') + '</div>' +
        '</div>';
      }).join('')}
    </div>
  `;
}
load();
</script>

</body>
</html>
